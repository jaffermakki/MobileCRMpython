let _repairPhotos=[];

function previewRepairPhotos(input){
  const files=Array.from(input.files);
  const container=document.getElementById('nr-photo-previews');
  const zone=document.getElementById('photo-drop-zone');
  if(zone) zone.style.borderColor='var(--accent)';

  files.forEach(file=>{
    if(file.size>2*1024*1024){ alert(`"${file.name}" is over 2MB — please use a smaller image`); return; }
    const reader=new FileReader();
    reader.onload=e=>{
      const dataUrl=e.target.result;
      _repairPhotos.push({name:file.name, data:dataUrl, addedAt:new Date().toISOString()});
      if(container){
        const idx=_repairPhotos.length-1;
        const wrap=document.createElement('div');
        wrap.style.cssText='position:relative;display:inline-block';
        wrap.innerHTML=`
          <img src="${dataUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border2)"/>
          <button onclick="_repairPhotos.splice(${idx},1);this.parentElement.remove()" style="position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>`;
        container.appendChild(wrap);
      }
    };
    reader.readAsDataURL(file);
  });
}

function lookupRepairCustomer(){
  const ph=document.getElementById('nr-phone')?.value?.trim();
  const found=customers.find(c=>c.phone===ph);
  const info=document.getElementById('nr-cust-info');
  if(!info) return;

  if(found){
    document.getElementById('nr-name').value=found.name;

    // Check for repairs still under warranty for this customer
    const warrantyAlerts=repairs.filter(r=>{
      if(r.customerId!==found.id) return false;
      if(!['COMPLETED','COLLECTED'].includes(r.status)) return false;
      const completedEntry=r.statusHistory?.slice().reverse().find(h=>h.status==='COMPLETED');
      if(!completedEntry) return false;
      const completedDate=new Date(completedEntry.date);
      const warrantyExpiry=new Date(completedDate.getTime()+(r.warrantyDays||90)*86400000);
      return warrantyExpiry>new Date();
    });

    let html=`<div class="alert alert-green" style="font-size:12px;margin-bottom:10px">✓ Existing customer: <strong>${escH(found.name)}</strong> · ${found.points} loyalty points</div>`;

    if(warrantyAlerts.length){
      html+=`<div class="alert alert-amber" style="font-size:12px;margin-bottom:10px">
        ⚠️ <strong>Active warranty on ${warrantyAlerts.length} previous repair${warrantyAlerts.length!==1?'s':''}:</strong><br/>
        ${warrantyAlerts.map(r=>{
          const completedEntry=r.statusHistory?.slice().reverse().find(h=>h.status==='COMPLETED');
          const completedDate=completedEntry?new Date(completedEntry.date):null;
          const expiryDate=completedDate?new Date(completedDate.getTime()+(r.warrantyDays||90)*86400000):null;
          const daysLeft=expiryDate?Math.ceil((expiryDate-new Date())/86400000):0;
          return `• Ticket #${r.ticketNo}: <strong>${escH(r.device)}</strong> — ${escH(r.issue||'')} 
            (${daysLeft} day${daysLeft!==1?'s':''} warranty remaining, expires ${expiryDate?expiryDate.toLocaleDateString('en-CA'):''})`;
        }).join('<br/>')}
        <br/><span style="color:var(--amber);font-weight:700">Confirm with customer if this is a warranty return before creating a new ticket.</span>
      </div>`;
    }

    info.innerHTML=html;
  } else {
    info.innerHTML='';
  }
}

function saveNewRepair(){
  const phone=document.getElementById('nr-phone')?.value?.trim();
  const name=document.getElementById('nr-name')?.value?.trim();
  const device=document.getElementById('nr-device')?.value?.trim();
  if(!phone||!name||!device){ alert('Customer phone, name, and device are required'); return; }

  // Create customer if new
  let cust=customers.find(c=>c.phone===phone);
  if(!cust){
    cust={id:uid(),name,phone,email:'',address:'',points:0,spent:0,lastVisit:today()};
    customers.push(cust);
    save('customers',customers);
  }

  const nextNo=(repairs.length>0?Math.max(...repairs.map(r=>r.ticketNo))+1:1001);
  const r={
    id:uid(), ticketNo:nextNo, status:'RECEIVED',
    customerId:cust.id, customerName:cust.name, phone:cust.phone,
    device, issue:document.getElementById('nr-issue')?.value,
    description:document.getElementById('nr-desc')?.value||'',
    estimatedCost:parseFloat(document.getElementById('nr-cost')?.value)||null,
    finalCost:null, approvedCost:null,
    warrantyDays:parseInt(document.getElementById('nr-warranty')?.value)||90,
    promisedBy:document.getElementById('nr-promised')?.value||'',
    technicianId:document.getElementById('nr-tech')?.value||'',
    statusHistory:[{status:'RECEIVED',note:'Ticket created',date:new Date().toISOString()}],
    parts:[], photos:[..._repairPhotos],
    createdAt:today(), updatedAt:today()
  };
  _repairPhotos=[];
  repairs.push(r);
  save('repairs',repairs);
  closeModal();
  updateBadges();
  renderRepairs(document.getElementById('page-content'));
}

function advanceRepair(id,nextStatus){
  const r=repairs.find(x=>x.id===id);
  if(!r) return;
  if(nextStatus==='COMPLETED' && !r.approvedCost && !r.finalCost){
    if(!confirm('No approved cost set. Mark as completed anyway?')) return;
  }
  const note=document.getElementById('rd-note')?.value||'';
  r.status=nextStatus;
  r.updatedAt=today();
  r.statusHistory.push({status:nextStatus,note,date:new Date().toISOString()});
  save('repairs',repairs);
  if(typeof addAudit==='function') addAudit('REPAIR_STATUS',`#${r.ticketNo} → ${STATUS_LABELS[nextStatus]}`);
  // Auto-send SMS when marked Ready for Pickup
  if(nextStatus==='READY'&&(r.phone||r.customerPhone)) sendReadySMS(r);
  closeModal();
  updateBadges();
  renderRepairsNew(document.getElementById('page-content'));
}

function saveRepairCosts(id){
  const r=repairs.find(x=>x.id===id);
  if(!r) return;
  r.estimatedCost=parseFloat(document.getElementById('rd-est')?.value)||null;
  r.approvedCost=parseFloat(document.getElementById('rd-approved')?.value)||null;
  r.finalCost=parseFloat(document.getElementById('rd-final')?.value)||null;
  save('repairs',repairs);
  alert('Costs saved!');
}

function addRepairPart(id){
  const r=repairs.find(x=>x.id===id);
  const sku=(document.getElementById('rd-part-sku')?.value||'').trim().toUpperCase();
  const qty=parseInt(document.getElementById('rd-part-qty')?.value||'1')||1;
  if(!sku){ alert('Enter a part SKU'); return; }
  const p=products.find(x=>x.sku.toUpperCase()===sku);
  if(!p){ alert(`No product with SKU "${sku}"`); return; }
  if(p.stock<qty){ alert(`Only ${p.stock} in stock`); return; }
  p.stock-=qty;
  save('products',products);
  r.parts=r.parts||[];
  const ex=r.parts.find(x=>x.sku===p.sku);
  if(ex) ex.qty+=qty;
  else r.parts.push({sku:p.sku,name:p.name,qty,cost:p.cost});
  save('repairs',repairs);
  openRepairDetail(id);// re-render
}

function generateRepairInvoice(id){
  const r=repairs.find(x=>x.id===id);
  if(!r) return;
  const cost=r.finalCost||r.approvedCost||r.estimatedCost||0;
  cart=[{productId:'__repair__',sku:'REPAIR',name:`Repair: ${r.device} — ${r.issue} (#${r.ticketNo})`,price:cost,qty:1,disc:0}];
  posCustomer=_customerIndex.get(r.customerId)||null;
  closeModal();
  showPage('pos');
}

function parseIgenLines(raw){
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  return lines.map(line=>{
    const parts = line.split(/[·\t]/).map(p=>p.trim());
    const sku = parts[0].toUpperCase().replace(/\s+/g,'');
    const rawName = parts[1]||'';

    // ── Category detection ────────────────────────────────
    let category='CASE';
    if(/^(CHG|WALL|CAR-CHG|COMBO)/i.test(sku)||/charger/i.test(rawName))  category='CHARGER';
    else if(/^(CBL|USB-C|LIGHT|MICRO|HDMI|AUX)/i.test(sku)||/cable/i.test(rawName)) category='CABLE';
    else if(/^(SCR|LCD|DISP)/i.test(sku)||/screen|lcd|display/i.test(rawName))      category='SCREEN';
    else if(/^(BAT|BATT)/i.test(sku)||/battery/i.test(rawName))                     category='BATTERY';
    else if(/^(TG|PRIV|MATT|POLY|GLASS)/i.test(sku)||/tempered|glass|protector/i.test(rawName)) category='ACCESSORY';
    else if(/^(PWR|POWER|BANK)/i.test(sku)||/power bank/i.test(rawName))            category='ACCESSORY';
    else if(/^(TAB|IPAD)/i.test(sku)||/tablet/i.test(rawName))                      category='ACCESSORY';
    else if(/^(REPR|TOOL|BKGLS|BATT)/i.test(sku)||/tool|repair|back glass/i.test(rawName)) category='PART';

    // ── Color from last SKU segment ───────────────────────
    const segs = sku.split('-');
    const colorMap={BLK:'Black',WHT:'White',RED:'Red',BLU:'Blue',PNK:'Pink',
      GRY:'Grey',GRN:'Green',PRP:'Purple',RGLD:'Rose Gold',
      GLD:'Gold',CLR:'Clear',TL:'Teal',NVY:'Navy',
      MINT:'Mint',YLW:'Yellow',ORG:'Orange',SMK:'Smoke'};
    const lastSeg = segs[segs.length-1];
    const color = colorMap[lastSeg]||lastSeg;

    // ── Phone model from SKU ──────────────────────────────
    const modelMap={
      'IP17PM':'iPhone 17 Pro Max','IP17P':'iPhone 17 Pro',
      'IP17A':'iPhone 17 Air','IP17':'iPhone 17',
      'IP16PM':'iPhone 16 Pro Max','IP16P':'iPhone 16 Pro',
      'IP16PL':'iPhone 16 Plus','IP16':'iPhone 16','IP16E':'iPhone 16e',
      'IP15PM':'iPhone 15 Pro Max','IP15P':'iPhone 15 Pro',
      'IP15PL':'iPhone 15 Plus','IP15':'iPhone 15',
      'IP14PM':'iPhone 14 Pro Max','IP14P':'iPhone 14 Pro',
      'IP14PL':'iPhone 14 Plus','IP14':'iPhone 14',
      'IP13PM':'iPhone 13 Pro Max','IP13P':'iPhone 13 Pro',
      'IP13M':'iPhone 13 Mini','IP13':'iPhone 13',
      'IP12PM':'iPhone 12 Pro Max','IP12P':'iPhone 12 Pro',
      'IP12M':'iPhone 12 Mini','IP12':'iPhone 12',
      'IP11PM':'iPhone 11 Pro Max','IP11P':'iPhone 11 Pro','IP11':'iPhone 11',
      'IPXM':'iPhone XS Max','IPXR':'iPhone XR','IPX':'iPhone X/XS',
      'IP8PL':'iPhone 8 Plus','IP7PL':'iPhone 7 Plus','IPSE':'iPhone SE',
      'S26U':'Galaxy S26 Ultra','S26P':'Galaxy S26 Plus','S26':'Galaxy S26',
      'S25U':'Galaxy S25 Ultra','S25P':'Galaxy S25 Plus','S25':'Galaxy S25',
      'S24U':'Galaxy S24 Ultra','S24P':'Galaxy S24 Plus','S24':'Galaxy S24',
      'S23U':'Galaxy S23 Ultra','S23P':'Galaxy S23 Plus','S23':'Galaxy S23',
      'S22U':'Galaxy S22 Ultra','S22P':'Galaxy S22 Plus','S22':'Galaxy S22',
      'A57':'Galaxy A57','A55':'Galaxy A55','A54':'Galaxy A54 5G',
      'A53':'Galaxy A53 5G','A37':'Galaxy A37','A36':'Galaxy A36',
      'A35':'Galaxy A35','A26':'Galaxy A26','A25':'Galaxy A25 5G',
      'A16':'Galaxy A16 5G','A15':'Galaxy A15 5G','A14':'Galaxy A14 5G',
      '11INC':'11 Inch','10INC':'10 Inch','8INC':'8 Inch',
    };
    let model='';
    for(const [k,v] of Object.entries(modelMap)){
      if(sku.includes(k)){ model=v; break; }
    }

    // ── Build product name ────────────────────────────────
    let name='';
    if(rawName){
      name=rawName.replace(/^[-–·]+|[-–·]+$/g,'').trim();
      if(color&&!colorMap[lastSeg]===false&&!name.toLowerCase().includes(color.toLowerCase())) name+=` — ${color}`;
    } else {
      const typeMap={
        'FLGMG':'Floral Glitter MagSafe','DMS':'Defend MagSafe',
        'TABC':'Tablet Case','CHG':'Fast Charger',
        'CBL':'Cable','TG':'Tempered Glass','BAT':'Battery',
        'PWR':'Power Bank','HOLDR':'Phone Holder','EARBUD':'Wireless Earbuds',
      };
      let type='Case';
      for(const [k,v] of Object.entries(typeMap)){
        if(sku.startsWith(k)){ type=v; break; }
      }
      name=[type,model,color].filter(Boolean).join(' — ');
    }

    return {sku, name:name||sku, category, subcategory:'iGen Mobility'};
  }).filter(p=>p.sku.length>2);
}

function previewIgenImport(){
  const raw=document.getElementById('igen-paste')?.value||'';
  const parsed=parseIgenLines(raw);
  const el=document.getElementById('igen-preview');
  if(!el) return;
  if(!parsed.length){
    el.innerHTML='<div class="alert alert-red">No valid lines found. Paste SKUs like: <code>FLGMG-IP15-PNK</code> or <code>FLGMG-IP15-PNK · Product Name</code></div>';
    return;
  }
  const dupes=parsed.filter(p=>products.find(x=>x.sku===p.sku));
  const newCount=parsed.length-dupes.length;
  el.innerHTML=`
  <div class="alert alert-${dupes.length&&!newCount?'amber':'green'}" style="margin-bottom:8px">
    Parsed <strong>${parsed.length}</strong> lines · <strong>${newCount}</strong> new · <strong>${dupes.length}</strong> already in inventory (will skip)
  </div>
  <div style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
  <table style="font-size:11px">
    <thead><tr><th>SKU</th><th>Name</th><th>Cat</th><th></th></tr></thead>
    <tbody>
    ${parsed.map(p=>{
      const exists=products.find(x=>x.sku===p.sku);
      return `<tr style="${exists?'opacity:.4':''}">
        <td class="font-mono" style="font-size:10px">${escH(p.sku)}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(p.name)}</td>
        <td><span class="badge badge-blue">${p.category}</span></td>
        <td>${exists?'<span class="text-amber font-bold">skip</span>':'<span class="text-green font-bold">new</span>'}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>`;
}

function confirmIgenImport(){
  const raw=document.getElementById('igen-paste')?.value||'';
  const parsed=parseIgenLines(raw);
  if(!parsed.length){ alert('No valid products to import'); return; }

  const cost=parseFloat(document.getElementById('igen-cost')?.value)||5;
  const price=parseFloat(document.getElementById('igen-price')?.value)||14.99;
  const stock=parseInt(document.getElementById('igen-stock')?.value)||10;
  const threshold=parseInt(document.getElementById('igen-threshold')?.value)||3;

  let added=0, skipped=0;
  parsed.forEach(p=>{
    if(products.find(x=>x.sku===p.sku)){ skipped++; return; }
    products.push({
      id:uid(), sku:p.sku, name:p.name,
      category:p.category, subcategory:p.subcategory,
      shelf:'', cost, price, stock, threshold,
      supplier:'iGen Mobility',
      createdAt:new Date().toISOString()
    });
    added++;
  });

  save('products',products);
  if(typeof addAudit==='function') addAudit('INVENTORY',`iGen Import: ${added} added, ${skipped} skipped`);
  closeModal();
  renderInventory(document.getElementById('page-content'));
  showAlert('global-alert',`✅ iGen Import: ${added} product${added!==1?'s':''} added${skipped?`, ${skipped} duplicate${skipped!==1?'s':''} skipped`:''}`, 'green');
}

function saveStockAdj(id){
  const p=products.find(x=>x.id===id);
  if(!p) return;
  const qty=parseInt(document.getElementById('adj-qty')?.value||'0');
  if(!qty){ alert('Enter a quantity'); return; }
  const newStock=p.stock+qty;
  if(newStock<0){ alert(`Cannot go below 0. Current stock: ${p.stock}`); return; }
  p.stock=newStock;
  save('products',products);
  closeModal(); updateBadges();
  renderInventory(document.getElementById('page-content'));
}

  const html=`
  <div class="form-row">
    <div class="form-group"><label>Full Name *</label><input id="ac-name" placeholder="James Wilson"/></div>
    <div class="form-group"><label>Phone *</label><input id="ac-phone" placeholder="4161234567" style="font-family:var(--mono)"/></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Email</label><input id="ac-email" type="email" placeholder="james@email.com"/></div>
    <div class="form-group"><label>City, Province</label><input id="ac-address" placeholder="Toronto, ON"/></div>
  </div>`;
  openModal('Add Customer',html,`<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewCustomer()">Add Customer</button>`);
}

function saveNewCustomer(){
  const name=document.getElementById('ac-name')?.value?.trim();
  const phone=document.getElementById('ac-phone')?.value?.trim();
  if(!name||!phone){ alert('Name and phone are required'); return; }
  if(customers.find(c=>c.phone===phone)){ alert('A customer with this phone number already exists'); return; }
  customers.push({
    id:uid(),name,phone,
    email:document.getElementById('ac-email')?.value||'',
    address:document.getElementById('ac-address')?.value||'',
    points:0,spent:0,storeCredit:0,lastVisit:today()
  });
  save('customers',customers);
  closeModal();
  renderCustomers(document.getElementById('page-content'));
}

  const custInvoices=invoices.filter(i=>i.customerId===id).slice().reverse().slice(0,8);
  const custRepairs=repairs.filter(r=>r.customerId===id).slice().reverse().slice(0,5);

  const html=`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:16px">
    <div class="stat-card" style="padding:10px"><div class="stat-label">Total Spent</div><div class="stat-value text-green" style="font-size:18px">${fmt(cu.spent)}</div></div>
    <div class="stat-card" style="padding:10px"><div class="stat-label">Loyalty Points</div><div class="stat-value" style="font-size:18px">${cu.points}</div></div>
    <div class="stat-card" style="padding:10px"><div class="stat-label">Store Credit</div><div class="stat-value text-amber" style="font-size:18px">${fmt(cu.storeCredit||0)}</div></div>
    <div class="stat-card" style="padding:10px"><div class="stat-label">Last Visit</div><div class="stat-value" style="font-size:14px">${fmtDate(cu.lastVisit)}</div></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <span style="font-size:12px;color:var(--text2)">📞 ${escH(cu.phone)} ${cu.email?`· ✉️ ${escH(cu.email)}`:''}</span>
    <button class="btn btn-secondary btn-sm" onclick="closeModal();openIssueCreditModal('${cu.id}')">🏷️ Issue Credit</button>
  </div>
  ${cu.notes?`
  <div style="background:var(--amber-bg);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;padding:8px 12px;margin:8px 0;font-size:12px;color:var(--text2)">
    <span style="font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;font-size:10px">Staff Notes · </span>${escH(cu.notes)}
    <button class="btn btn-secondary btn-sm" style="margin-left:8px;padding:2px 8px" onclick="editCustomerNotes('${cu.id}')">Edit</button>
  </div>`:`
  <button class="btn btn-secondary btn-sm" style="margin:6px 0" onclick="editCustomerNotes('${cu.id}')">📝 Add Staff Note</button>`}
  <hr class="divider"/>
  <p style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Recent Invoices</p>
  ${custInvoices.length===0?'<p style="font-size:13px;color:var(--text3)">No purchases yet</p>':
  `<table><thead><tr><th>#</th><th>Items</th><th>Payment</th><th class="text-right">Total</th><th>Date</th><th></th></tr></thead><tbody>
  ${custInvoices.map(inv=>`<tr>
    <td class="font-mono text-accent" style="font-size:12px">${inv.number}</td>
    <td>${inv.lines.length} item${inv.lines.length!==1?'s':''}</td>
    <td>${inv.payment}</td>
    <td class="text-right font-bold">${fmt(inv.total)}</td>
    <td style="font-size:12px;color:var(--text2)">${fmtDate(inv.date)}</td>
    <td style="display:flex;gap:4px">
      <button class="btn btn-secondary btn-sm" onclick="printInvoice(invoices.find(x=>x.id==='${inv.id}'))" title="Print invoice">🖨️</button>
      ${cu.email?`<button class="btn btn-secondary btn-sm" onclick="sendEmailReceipt(invoices.find(x=>x.id==='${inv.id}'),'${escH(cu.email)}')" title="Email receipt">✉️</button>`:''}
    </td>
  </tr>`).join('')}
  </tbody></table>`}
  <p style="font-size:12px;font-weight:700;color:var(--text2);margin:12px 0 8px;text-transform:uppercase;letter-spacing:.5px">Repair History</p>
  ${custRepairs.length===0?'<p style="font-size:13px;color:var(--text3)">No repairs yet</p>':
  custRepairs.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
    <span style="font-size:13px"><strong>#${r.ticketNo}</strong> · ${escH(r.device)}</span>
    <span class="badge ${STATUS_BADGE[r.status]}">${STATUS_LABELS[r.status]}</span>

function editCustomerNotes(id){
  const cu=customers.find(x=>x.id===id);
  if(!cu) return;
  const html=`
  <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Staff notes are only visible here — customers never see them. Use for anything useful: preferred contact method, difficult topics, device history, special pricing, etc.</p>
  <textarea id="cust-notes-input" rows="5" placeholder="e.g. Prefers text over calls. Brought in water-damaged phone claiming it wasn't dropped. Give warranty carefully.">${escH(cu.notes||'')}</textarea>`;
  openModal(`Notes — ${cu.name}`, html,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveCustomerNotes('${id}')">Save Note</button>`);
  setTimeout(()=>document.getElementById('cust-notes-input')?.focus(),100);
}

function saveCustomerNotes(id){
  const cu=customers.find(x=>x.id===id);
  if(!cu) return;
  cu.notes=document.getElementById('cust-notes-input')?.value||'';
  save('customers',customers);
  closeModal();
  openCustomerDetail(id);
}

function openIssueCreditModal(customerId){
  const cu=customers.find(x=>x.id===customerId);
  if(!cu) return;
  const html=`
  <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Current store credit: <strong>${fmt(cu.storeCredit||0)}</strong></p>
  <div class="form-group"><label>Amount to Issue ($)</label><input id="ic-amount" type="number" placeholder="25.00" autofocus/></div>
  <div class="form-group"><label>Reason</label>
    <select id="ic-reason">
      <option>Customer goodwill</option>
      <option>Refund</option>
      <option>Promotional credit</option>
      <option>Price match adjustment</option>
      <option>Other</option>
    </select>
  </div>`;
  openModal(`Issue Store Credit — ${cu.name}`, html, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="confirmIssueCredit('${customerId}')">Issue Credit</button>`);
}

function confirmIssueCredit(customerId){
  const amt=parseFloat(document.getElementById('ic-amount')?.value);
  const reason=document.getElementById('ic-reason')?.value;
  if(isNaN(amt)||amt<=0){ alert('Enter a valid amount'); return; }
  issueStoreCredit(customerId, amt, reason);
  closeModal();
  showAlert('global-alert',`✅ ${fmt(amt)} store credit issued`,'green');
  renderCustomers(document.getElementById('page-content'));
}

function renderReports(c){
  const now=new Date();
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
  const lastMonthStart=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().slice(0,10);
  const lastMonthEnd=new Date(now.getFullYear(),now.getMonth(),0).toISOString().slice(0,10);
  const todayStr=today();

  const thisMonth=invoices.filter(i=>i.date>=monthStart&&i.type!=='REFUND'&&i.type!=='STORE_CREDIT_ISSUED');
  const lastMonth=invoices.filter(i=>i.date>=lastMonthStart&&i.date<=lastMonthEnd&&i.type!=='REFUND'&&i.type!=='STORE_CREDIT_ISSUED');
  const monthRevenue=thisMonth.reduce((s,i)=>s+i.total,0);
  const lastMonthRevenue=lastMonth.reduce((s,i)=>s+i.total,0);
  const monthTax=thisMonth.reduce((s,i)=>s+(i.totalTax||i.tax||0),0);
  const monthProfit=invoices.reduce((s,inv)=>{
    return s+inv.lines.reduce((ls,l)=>{
      const p=_productIndex.get(l.productId);
      if(!p) return ls+(l.price*l.qty);
      return ls+(l.price-p.cost)*l.qty;
    },0);
  },0);

  // Trend helper: returns HTML badge showing change vs last period
  function trend(current, previous, prefix=''){
    if(!previous) return '';
    const pct=Math.round(((current-previous)/previous)*100);
    const up=pct>=0;
    const color=up?'var(--green)':'var(--red)';
    return `<span style="font-size:11px;font-weight:700;color:${color};margin-left:6px">${up?'▲':'▼'} ${Math.abs(pct)}% vs last month</span>`;
  }

  // By category
  const byCat={};
  invoices.forEach(inv=>inv.lines.forEach(l=>{
    const p=_productIndex.get(l.productId);
    const cat=p?p.category:'REPAIR';
    byCat[cat]=(byCat[cat]||0)+l.price*l.qty;
  }));

  // By payment
  const byPay={};
  invoices.forEach(i=>{ byPay[i.payment]=(byPay[i.payment]||0)+i.total; });

  // Top products
  const prodSales={};
  invoices.forEach(inv=>inv.lines.forEach(l=>{
    if(!l.productId||l.productId==='__repair__') return;
    prodSales[l.productId]=(prodSales[l.productId]||{name:l.name,qty:0,rev:0});
    prodSales[l.productId].qty+=l.qty;
    prodSales[l.productId].rev+=l.price*l.qty;
  }));
  const topProds=Object.entries(prodSales).sort((a,b)=>b[1].qty-a[1].qty).slice(0,8);

  c.innerHTML=`
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">This Month Revenue</div>
      <div class="stat-value text-green">${fmt(monthRevenue)}</div>
      <div class="stat-sub">${thisMonth.length} invoices ${trend(monthRevenue,lastMonthRevenue)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tax Collected (This Month)</div>
      <div class="stat-value text-amber">${fmt(monthTax)}</div>
      <div class="stat-sub">${CA_PROVINCES[settings.province]?.label||'Canada'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">All-time Gross Profit</div>
      <div class="stat-value text-green">${fmt(monthProfit)}</div>
      <div class="stat-sub">revenue minus product cost</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Invoices</div>
      <div class="stat-value">${invoices.length}</div>
      <div class="stat-sub">${lastMonth.length} last month ${trend(thisMonth.length,lastMonth.length)}</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="card-title">Revenue by Category</div>
      ${Object.entries(byCat).length===0?'<p class="text-muted" style="font-size:13px">No sales yet</p>':
      Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,rev])=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
        <span class="badge ${CAT_BADGE[cat]||'badge-gray'}">${cat}</span>
        <span class="font-bold">${fmt(rev)}</span>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Revenue by Payment Method</div>
      ${Object.entries(byPay).length===0?'<p class="text-muted" style="font-size:13px">No sales yet</p>':
      Object.entries(byPay).sort((a,b)=>b[1]-a[1]).map(([pay,rev])=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;font-weight:600">${pay}</span>
        <span class="font-bold">${fmt(rev)}</span>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Top Selling Products</div>
      ${topProds.length===0?'<p class="text-muted" style="font-size:13px">No product sales yet</p>':
      topProds.map(([id,d],i)=>`
      <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="width:20px;height:20px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${i+1}</span>
        <div style="flex:1;min-width:0"><p style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(d.name)}</p></div>
        <div style="text-align:right;flex-shrink:0"><p class="font-bold">${d.qty} units</p><p style="font-size:11px;color:var(--text3)">${fmt(d.rev)}</p></div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Low / Out of Stock</div>
      ${products.filter(p=>p.stock<=p.threshold).length===0?'<p class="text-green" style="font-size:13px">✓ All products adequately stocked</p>':
      products.filter(p=>p.stock<=p.threshold).map(p=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
        <div><p style="font-size:13px;font-weight:600">${escH(p.name)}</p><p style="font-size:11px;color:var(--text3)">${escH(p.sku)}</p></div>
        <span class="font-bold text-red">${p.stock} left</span>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Profit by Brand</div>
      ${(()=>{
        const byBrand={};
        invoices.forEach(inv=>inv.lines.forEach(l=>{
          const p=_productIndex.get(l.productId);
          if(!p) return;
          const brand=p.subcategory||'Generic';
          byBrand[brand]=byBrand[brand]||{revenue:0,profit:0};
          byBrand[brand].revenue+=l.price*l.qty;
          byBrand[brand].profit+=(l.price-p.cost)*l.qty;
        }));
        const entries=Object.entries(byBrand).sort((a,b)=>b[1].profit-a[1].profit);
        if(entries.length===0) return '<p class="text-muted" style="font-size:13px">No sales yet</p>';
        return entries.map(([brand,d])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px;font-weight:600">${escH(brand)}</span>
          <div style="text-align:right"><p class="font-bold text-green">${fmt(d.profit)}</p><p style="font-size:11px;color:var(--text3)">${fmt(d.revenue)} revenue</p></div>
        </div>`).join('');
      })()}
    </div>
  </div>

  <div class="card mt-3">
    <div class="card-title">🍁 GST/HST/PST Tax Report (for CRA filing)</div>
    ${(()=>{
      // Group by month
      const byMonth={};
      invoices.filter(i=>i.type!=='REFUND'&&i.type!=='STORE_CREDIT_ISSUED').forEach(inv=>{
        const m=inv.date.slice(0,7); // YYYY-MM
        byMonth[m]=byMonth[m]||{gst:0,pst:0,hst:0,total:0,sales:0};
        byMonth[m].gst+=inv.gst||0;
        byMonth[m].pst+=inv.pst||0;
        byMonth[m].hst+=inv.hst||0;
        byMonth[m].total+=inv.totalTax||0;
        byMonth[m].sales+=inv.subtotal||0;
      });
      const months=Object.keys(byMonth).sort().reverse().slice(0,12);
      if(months.length===0) return '<p class="text-muted" style="font-size:13px">No tax data yet</p>';
      return `<table><thead><tr><th>Month</th><th class="text-right">Taxable Sales</th><th class="text-right">GST</th><th class="text-right">PST/QST</th><th class="text-right">HST</th><th class="text-right">Total Tax</th></tr></thead><tbody>
      ${months.map(m=>{
        const d=byMonth[m];
        const monthLabel=new Date(m+'-01').toLocaleDateString('en-CA',{year:'numeric',month:'long'});
        return `<tr>
          <td class="font-bold">${monthLabel}</td>
          <td class="text-right">${fmt(d.sales)}</td>
          <td class="text-right">${fmt(d.gst)}</td>
          <td class="text-right">${fmt(d.pst)}</td>
          <td class="text-right">${fmt(d.hst)}</td>
          <td class="text-right font-bold text-amber">${fmt(d.total)}</td>
        </tr>`;
      }).join('')}
      </tbody></table>
      <button class="btn btn-secondary btn-sm mt-3" onclick="exportTaxReportCSV()">⬇️ Export Tax Report (CSV)</button>`;
    })()}
  </div>

  <!-- ── End-of-Day Sales Summary ──────────────────────────── -->
  <div class="card mt-3">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin-bottom:0">📅 End-of-Day Sales Summary</div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="eod-month-filter" onchange="debounce('eod',()=>renderEODSummary(),80)" style="font-size:12px;padding:5px 8px">
          <option value="">All months</option>
          ${[...new Set(invoices.filter(i=>i.date).map(i=>i.date.slice(0,7)))].sort().reverse()
            .map(m=>{
              const [yr,mo]=m.split('-');
              const label=new Date(parseInt(yr),parseInt(mo)-1,1).toLocaleDateString('en-CA',{year:'numeric',month:'long'});
              return `<option value="${m}">${label}</option>`;
            }).join('')}
        </select>
        <button class="btn btn-secondary btn-sm" onclick="printEODReport()">🖨️ Print Report</button>
      </div>
    </div>
    <div id="eod-summary-content"></div>
  </div>

  <!-- ── Full Invoice Register grouped by day ──────────────── -->
  <div class="card mt-3">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin-bottom:0">Invoice Register — All Transactions</div>
      <span style="font-size:12px;color:var(--text2)">${invoices.filter(i=>i.type!=='STORE_CREDIT_ISSUED').length} total · ${fmt(invoices.filter(i=>i.type!=='REFUND'&&i.type!=='STORE_CREDIT_ISSUED').reduce((s,i)=>s+i.total,0))} all-time</span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <input id="rep-inv-search" placeholder="Search invoice #, customer, payment…"
        style="flex:1;min-width:180px"
        oninput="debounce('rep-inv-search',()=>{
          const q=(document.getElementById('rep-inv-search')?.value||'').toLowerCase();
          const rows=document.querySelectorAll('#rep-inv-tbody tr[data-search]');

        },200)"/>
      <select id="rep-inv-month" onchange="filterRepInvByMonth()" style="width:auto;font-size:12px">
        <option value="">All months</option>
        ${[...new Set(invoices.map(i=>i.date?i.date.slice(0,7):'').filter(Boolean))].sort().reverse()
          .map(m=>{
            const [yr,mo]=m.split('-');
            const label=new Date(parseInt(yr),parseInt(mo)-1,1).toLocaleDateString('en-CA',{year:'numeric',month:'long'});
            return `<option value="${m}">${label}</option>`;
          }).join('')}
      </select>
      <select id="rep-inv-view" onchange="debounce('rivw',()=>toggleInvView(),80)" style="width:auto;font-size:12px">
        <option value="grouped">Grouped by Day</option>
        <option value="flat">Flat List</option>
      </select>
    </div>
    <div class="table-wrap" style="max-height:600px;overflow-y:auto">
    <table>
      <thead><tr>
        <th>#</th><th>Invoice</th><th>Date</th><th>Customer</th>
        <th>Items</th><th>Payment</th><th class="text-right">Subtotal</th>

// ── Render invoice rows (grouped by day or flat) ─────────────
function renderInvoiceRows(invList, grouped=true){
  const list = invList.filter(i=>i.type!=='STORE_CREDIT_ISSUED').slice().reverse();
  if(!list.length) return `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text3)">No invoices yet</td></tr>`;

  if(!grouped){
    return list.map((inv,idx)=>buildInvRow(inv, idx%2===0)).join('');
  }

  // Group by date
  const byDay = {};
  list.forEach(inv=>{
    const d = inv.date||'unknown';
    if(!byDay[d]) byDay[d]=[];
    byDay[d].push(inv);
  });

  return Object.entries(byDay).map(([day,dayInvs])=>{
    const dayTotal   = dayInvs.reduce((s,i)=>s+i.total,0);
    const dayTax     = dayInvs.reduce((s,i)=>s+(i.totalTax||i.hst||0),0);
    const daySub     = dayInvs.reduce((s,i)=>s+(i.subtotal||i.total),0);
    const dayLabel   = day==='unknown'?'Unknown Date':
      new Date(day+'T12:00:00').toLocaleDateString('en-CA',
        {weekday:'long',year:'numeric',month:'long',day:'numeric'});

    const rows = dayInvs.map((inv,idx)=>buildInvRow(inv, idx%2===0)).join('');

    // Day header
    const dayHdr = `<tr style="background:var(--surface2);border-top:2px solid var(--accent)">
      <td colspan="10" style="padding:8px 14px">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
          <span style="font-size:12px;font-weight:700;color:var(--text);letter-spacing:.2px">📅 ${escH(dayLabel)}</span>
          <span style="font-size:11px;color:var(--text2)">${dayInvs.length} transaction${dayInvs.length!==1?'s':''}</span>
        </div>
      </td>
    </tr>`;

    // Day footer — end-of-day total
    const dayFtr = `<tr style="background:var(--green-bg);border-bottom:2px solid var(--border)">
      <td colspan="5" style="padding:8px 14px">
        <span style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px">
          End of Day — ${dayInvs.length} sale${dayInvs.length!==1?'s':''}
        </span>
      </td>
      <td colspan="2" style="padding:8px 14px;text-align:right;font-size:12px;color:var(--text2)">
        Subtotal: <strong>${fmt(daySub)}</strong>
      </td>
      <td style="padding:8px 14px;text-align:right;font-size:12px;color:var(--amber)">
        Tax: <strong>${fmt(dayTax)}</strong>
      </td>
      <td style="padding:8px 14px;text-align:right">
        <span style="font-size:14px;font-weight:800;color:var(--accent)">${fmt(dayTotal)}</span>
      </td>
      <td style="padding:8px 14px;text-align:center">
        <button class="btn btn-secondary btn-sm" title="Print day summary"
          onclick="printDaySummary('${day}')" style="font-size:10px">🖨️ Day</button>
      </td>
    </tr>`;

    return dayHdr + rows + dayFtr;
  }).join('');
}

// ── Single invoice row builder ───────────────────────────────

  const bg = altBg ? 'var(--surface2)' : 'var(--surface)';
  const searchKey=[inv.number,inv.customerName||'',inv.payment||'',inv.date||''].join(' ').toLowerCase();
  return `<tr data-search="${escH(searchKey)}" data-month="${(inv.date||'').slice(0,7)}" style="background:${bg}">
    <td style="font-size:11px;color:var(--text3)">${inv.number?.split('-').pop()||''}</td>
    <td class="font-mono text-accent" style="font-size:12px;font-weight:700">${escH(inv.number)}</td>
    <td style="font-size:12px;color:var(--text2);white-space:nowrap">${fmtDate(inv.date)}</td>
    <td style="font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(inv.customerName||'Walk-in')}</td>
    <td style="font-size:12px;color:var(--text2)">${inv.lines?.length||0} item${(inv.lines?.length||0)!==1?'s':''}</td>
    <td><span class="badge ${
      inv.payment==='Cash'?'badge-green':
      inv.payment==='E-Transfer'?'badge-amber':
      inv.payment==='Credit Card'?'badge-blue':'badge-gray'}">${escH(inv.payment||'—')}</span></td>
    <td class="text-right" style="font-size:12px">${fmt(inv.subtotal||inv.total)}</td>
    <td class="text-right" style="font-size:12px;color:var(--amber)">${fmt(inv.totalTax||inv.hst||0)}</td>

      <button class="btn btn-secondary btn-sm" style="margin-left:3px" title="Email receipt"
        onclick="emailInvoice('${inv.id}')">📧</button>

// ── EOD Summary renderer ──────────────────────────────────────
function renderEODSummary(){
  const el = document.getElementById('eod-summary-content');
  if(!el) return;

  const monthFilter = document.getElementById('eod-month-filter')?.value||'';
  let list = invoices.filter(i=>i.type!=='REFUND'&&i.type!=='STORE_CREDIT_ISSUED');
  if(monthFilter) list = list.filter(i=>i.date?.startsWith(monthFilter));

  if(!list.length){
    el.innerHTML='<p class="text-muted" style="font-size:13px">No sales data for the selected period.</p>';
    return;

  // Group by day
  const byDay={};
  list.forEach(inv=>{
    const d=inv.date||'unknown';
    if(!byDay[d]) byDay[d]={invs:[],total:0,tax:0,sub:0,byPay:{}};
    byDay[d].invs.push(inv);
    byDay[d].total += inv.total;
    byDay[d].tax   += inv.totalTax||inv.hst||0;

      <div style="font-size:24px;font-weight:800;font-family:var(--mono);color:var(--amber);margin-top:4px">${fmt(grandTax)}</div>

    </div>
    <div style="background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:14px;text-align:center">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)">Daily Average</div>
      <div style="font-size:24px;font-weight:800;font-family:var(--mono);color:var(--text);margin-top:4px">${fmt(days.length?grandTotal/days.length:0)}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">avg ${grandTxns&&days.length?(grandTxns/days.length).toFixed(1):0} txns/day</div>
    </div>
  </div>

  <!-- Day-by-day breakdown table -->

      <th>Date</th><th>Day</th><th class="text-right">Transactions</th>

      const d=byDay[day];
      const bg=idx%2===0?'var(--surface2)':'var(--surface)';
      const dayLabel=day==='unknown'?'Unknown':
        new Date(day+'T12:00:00').toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});

  <table>
    <thead><tr>
      <th>Invoice</th><th>Customer</th><th>Items</th>
      <th>Payment</th><th class="text-right">Subtotal</th>
      <th class="text-right">Tax</th><th class="text-right">Total</th>
    </tr></thead>
    <tbody>
    ${dayInvs.map(inv=>`
      <tr>
        <td style="font-weight:700;color:#0f8b5f">${escH(inv.number)}</td>
        <td>${escH(inv.customerName||'Walk-in')}</td>
        <td>${inv.lines?.length||0} item${(inv.lines?.length||0)!==1?'s':''}</td>
        <td>${escH(inv.payment||'—')}</td>
        <td class="text-right">${fmt(inv.subtotal||inv.total)}</td>
        <td class="text-right" style="color:#b8860b">${fmt(inv.totalTax||inv.hst||0)}</td>
        <td class="text-right" style="font-weight:700">${fmt(inv.total)}</td>
      </tr>`).join('')}
    </tbody>
    <tfoot>
      <tr class="total-row">
        <td colspan="4" style="padding:9px 10px">DAY TOTAL</td>
        <td class="text-right" style="padding:9px 10px">${fmt(daySub)}</td>
        <td class="text-right" style="padding:9px 10px">${fmt(dayTax)}</td>
        <td class="text-right" style="padding:9px 10px;font-size:15px">${fmt(dayTotal)}</td>
      </tr>
    </tfoot>
  </table>
  <div class="footer">
    Printed ${new Date().toLocaleString('en-CA')} · ${escH(settings.shopAddress||'')} · ${escH(settings.shopName||'Tech-Pro+')}
    <br>🌿 This report is designed to be printed minimally — consider saving digitally where possible
  </div>
  <script>window.onload=()=>window.print();<\/script>
  </body></html>`);
  printWin.document.close();
}

// MONTH-END EXCEL EXPORT (SheetJS / xlsx.js)
// Generates a 5-sheet formatted Excel workbook directly in
// the browser — no server, no install needed.
// ══════════════════════════════════════════════════════════

function openExcelExportModal(){
  // Build month options from actual invoice data
  const months = {};
  invoices.forEach(inv=>{
    if(!inv.date) return;
    const key = inv.date.slice(0,7); // YYYY-MM
    months[key] = (months[key]||0)+1;
  });
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  if(!months[thisMonth]) months[thisMonth]=0; // always show current month as option

  const sortedMonths = Object.keys(months).sort().reverse();

  const html=`
  <p style="font-size:13px;color:var(--text2);margin-bottom:16px">
    Select a month to export. The Excel file will include 5 sheets:
    Executive Summary, Full Invoice Register, Daily Sales with chart,
    CRA Tax Report, and Staff Performance.
  </p>
  <div class="form-group">
    <label>Select Month</label>
    <select id="excel-month-sel">
      ${sortedMonths.map(m=>{
        const [yr,mo]=m.split('-');
        const label=new Date(parseInt(yr),parseInt(mo)-1,1)
          .toLocaleDateString('en-CA',{year:'numeric',month:'long'});
        return `<option value="${m}">${label} (${months[m]} invoice${months[m]!==1?'s':''})</option>`;
      }).join('')}
    </select>
  </div>
  <div class="alert alert-blue" style="background:var(--accent-glow);border:1px solid rgba(15,139,95,.25);color:var(--accent);font-size:12px">
    ℹ️ The file opens directly in Excel or Google Sheets. All totals use live formulas so you can adjust figures and they recalculate automatically.
  </div>
  <div id="excel-export-status" style="margin-top:10px"></div>`;

  openModal('📊 Export Month-End Excel Report', html,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="generateMonthEndExcel()">⬇️ Generate & Download</button>`,
    false);
}

async function generateMonthEndExcel(){
  const statusEl = document.getElementById('excel-export-status');
  const monthSel = document.getElementById('excel-month-sel');
  if(!monthSel){ alert('Select a month first'); return; }

  const selectedMonth = monthSel.value; // YYYY-MM
  const [yr,mo] = selectedMonth.split('-');
  const monthLabel = new Date(parseInt(yr),parseInt(mo)-1,1)
    .toLocaleDateString('en-CA',{year:'numeric',month:'long'});

  if(statusEl) statusEl.innerHTML='<div class="alert alert-blue" style="background:var(--accent-glow);border:1px solid rgba(15,139,95,.25);color:var(--accent);font-size:12px">⏳ Building Excel file…</div>';

  // Load SheetJS from CDN
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');
  } catch(e){
    if(statusEl) statusEl.innerHTML=`<div class="alert alert-red">Failed to load Excel library: ${e.message}</div>`;
    return;
  }

  const XLSX = window.XLSX;
  if(!XLSX){ if(statusEl) statusEl.innerHTML='<div class="alert alert-red">Excel library not available</div>'; return; }

  // ── Filter invoices for selected month ────────────────────
  const monthInvs = invoices.filter(i=>
    i.date && i.date.startsWith(selectedMonth) &&
    i.type !== 'REFUND' && i.type !== 'STORE_CREDIT_ISSUED'
  ).sort((a,b)=>a.date.localeCompare(b.date));

  if(monthInvs.length===0){
    if(statusEl) statusEl.innerHTML='<div class="alert alert-amber">No invoices found for this month. Complete some sales first.</div>';
    return;
  }

  // ── Derived totals ────────────────────────────────────────
  const T_revenue  = monthInvs.reduce((s,i)=>s+i.total,0);
  const T_sub      = monthInvs.reduce((s,i)=>s+(i.subtotal||0),0);
  const T_disc     = monthInvs.reduce((s,i)=>s+(i.discount||0),0);
  const T_hst      = monthInvs.reduce((s,i)=>s+(i.totalTax||i.hst||0),0);
  const T_txns     = monthInvs.length;
  const T_avg      = T_txns ? T_revenue/T_txns : 0;

  const byPay={}, byCat={}, byDay={}, byStaff={};
  monthInvs.forEach(inv=>{
    const pay=inv.payment||'Unknown';
    byPay[pay]  = byPay[pay]  ||{rev:0,cnt:0}; byPay[pay].rev+=inv.total; byPay[pay].cnt++;
    const cat=inv.lines?.[0]?_productIndex.get(inv.lines[0].productId)?.category||'Repair':'Repair';
    byCat[cat]  = byCat[cat]  ||{rev:0,cnt:0}; byCat[cat].rev+=inv.total; byCat[cat].cnt++;
    const d=inv.date||'';
    byDay[d]    = byDay[d]    ||{rev:0,cnt:0}; byDay[d].rev+=inv.total; byDay[d].cnt++;
    const st=inv.staffId?(staff.find(s=>s.id===inv.staffId)||{}).name||'Unknown':'Unknown';
    byStaff[st] = byStaff[st]||{rev:0,cnt:0}; byStaff[st].rev+=inv.total; byStaff[st].cnt++;
  });

  const wb = XLSX.utils.book_new();

  // ── PALETTE ───────────────────────────────────────────────
  const DARK    = '0D1410';
  const EMERALD = '0F8B5F';
  const GOLD    = 'B8964A';
  const LIGHT   = 'F0F5F1';
  const RED     = 'C0392B';
  const AMBER   = 'B8860B';
  const WHITE   = 'FFFFFF';
  const MUTED   = '6B716A';

  const moneyFmt = '#,##0.00';
  const numFmt   = '#,##0';
  const pctFmt   = '0.0%';

  function hdrStyle(bg=DARK, fg=WHITE, size=11, bold=true, halign='center'){
    return {font:{name:'Calibri',sz:size,bold,color:{rgb:fg}},
            fill:{fgColor:{rgb:bg}},
            alignment:{horizontal:halign,vertical:'center',wrapText:true},
            border:{top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}}};
  }
  function dataStyle(bold=false, halign='left', color=null, bg=null){
    return {font:{name:'Calibri',sz:10,bold,color:{rgb:color||'1A1D1A'}},
            fill:{fgColor:{rgb:bg||WHITE}},
            alignment:{horizontal:halign,vertical:'center'},
            border:{top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}}};
  }
  function moneyStyle(bold=false,color=null,bg=null){
    return {...dataStyle(bold,'right',color,bg),numFmt:moneyFmt};
  }
  function pctStyle(bg=null){
    return {...dataStyle(false,'center',null,bg),numFmt:pctFmt};
  }

  // ══════════════════════════════════════════════════════════
  // SHEET 1 — SUMMARY
  // ══════════════════════════════════════════════════════════
  const s1_data = [];

  // Title rows
  s1_data.push([{v:`${settings.shopName||'Tech-Pro+'} — Month-End Sales Report`,
    s:hdrStyle(DARK,WHITE,16)},'','','','','','','']);
  s1_data.push([{v:`${monthLabel}  ·  ${settings.shopAddress||''}  ·  GST/HST# ${settings.shopGST||'—'}`,
    s:hdrStyle(DARK,GOLD,10,false)},'','','','','','','']);
  s1_data.push([{v:''}]);

  // KPI section header
  s1_data.push([{v:'KEY PERFORMANCE INDICATORS',s:hdrStyle(EMERALD,WHITE,11)},'','','','','','','']);
  s1_data.push([
    {v:'TOTAL REVENUE',  s:hdrStyle(MUTED,WHITE,9)},  '',
    {v:'TRANSACTIONS',   s:hdrStyle(MUTED,WHITE,9)},  '',
    {v:'AVG TICKET',     s:hdrStyle(MUTED,WHITE,9)},  '',
    {v:'HST COLLECTED',  s:hdrStyle(MUTED,WHITE,9)},  '',
  ]);
  s1_data.push([
    {v:T_revenue,  s:{...moneyStyle(true,WHITE,EMERALD),font:{name:'Calibri',sz:18,bold:true,color:{rgb:WHITE}}}}, '',
    {v:T_txns,     s:{...dataStyle(true,'center',WHITE,DARK),numFmt:numFmt}},  '',
    {v:T_avg,      s:{...moneyStyle(true,WHITE,DARK)}},  '',
    {v:T_hst,      s:{...moneyStyle(true,WHITE,AMBER)}},  '',
  ]);
  s1_data.push([{v:''}]);

  // Payment breakdown
  s1_data.push([{v:'PAYMENT METHOD BREAKDOWN',s:hdrStyle(DARK,WHITE,11)},'','','','','','','']);
  s1_data.push([
    {v:'Payment Method',s:hdrStyle()},
    {v:'Revenue (CA$)', s:hdrStyle()},
    {v:'Transactions',  s:hdrStyle()},
    {v:'% of Total',    s:hdrStyle()},
    {v:'REVENUE BY CATEGORY',s:hdrStyle(DARK)},
    {v:'Revenue (CA$)',s:hdrStyle()},
    {v:'Txns',         s:hdrStyle()},
    {v:'% Share',      s:hdrStyle()},
  ]);

  const payRows = Object.entries(byPay).sort((a,b)=>b[1].rev-a[1].rev);
  const catRows = Object.entries(byCat).sort((a,b)=>b[1].rev-a[1].rev);
  const maxRows = Math.max(payRows.length, catRows.length);

  for(let i=0;i<maxRows;i++){
    const bg = i%2===0 ? LIGHT : WHITE;
    const [pm,pd] = payRows[i]||['',{rev:0,cnt:0}];
    const [cm,cd] = catRows[i]||['',{rev:0,cnt:0}];
    s1_data.push([
      {v:pm||'',  s:dataStyle(true,'left',null,bg)},
      {v:pd.rev||'', s:moneyStyle(true,EMERALD,bg)},
      {v:pd.cnt||'', s:dataStyle(false,'center',null,bg)},
      {v:T_revenue?pd.rev/T_revenue:0, s:pctStyle(bg)},
      {v:cm||'',  s:dataStyle(false,'left',null,bg)},
      {v:cd.rev||'', s:moneyStyle(true,EMERALD,bg)},
      {v:cd.cnt||'', s:dataStyle(false,'center',null,bg)},
      {v:T_revenue?cd.rev/T_revenue:0, s:pctStyle(bg)},
    ]);
  }

  // Totals row
  s1_data.push([
    {v:'TOTAL', s:hdrStyle(EMERALD,WHITE,10,'left')},
    {v:T_revenue, s:moneyStyle(true,WHITE,EMERALD)},
    {v:T_txns,   s:dataStyle(true,'center',WHITE,EMERALD)},
    {v:'100.0%', s:hdrStyle(EMERALD,WHITE,10)},
    '','','',''
  ]);

  // Footer
  s1_data.push([{v:''}]);
  s1_data.push([{v:`Generated by Tech-Pro+ CRM · ${settings.shopAddress||''} · ${new Date().toLocaleString('en-CA')}`,
    s:{font:{name:'Calibri',sz:9,italic:true,color:{rgb:MUTED}},
       alignment:{horizontal:'center'}}},'','','','','','','']);

  const ws1 = XLSX.utils.aoa_to_sheet(s1_data);

  // Merge title cells
  ws1['!merges']=[
    {s:{r:0,c:0},e:{r:0,c:7}},{s:{r:1,c:0},e:{r:1,c:7}},
    {s:{r:3,c:0},e:{r:3,c:7}},
    {s:{r:5,c:0},e:{r:5,c:1}},{s:{r:5,c:2},e:{r:5,c:3}},
    {s:{r:5,c:4},e:{r:5,c:5}},{s:{r:5,c:6},e:{r:5,c:7}},
    {s:{r:6,c:0},e:{r:6,c:1}},{s:{r:6,c:2},e:{r:6,c:3}},
    {s:{r:6,c:4},e:{r:6,c:5}},{s:{r:6,c:6},e:{r:6,c:7}},
    {s:{r:7,c:0},e:{r:7,c:7}},
    {s:{r:s1_data.length-1,c:0},e:{r:s1_data.length-1,c:7}},
  ];
  ws1['!cols']=[{wch:22},{wch:16},{wch:14},{wch:12},{wch:22},{wch:16},{wch:10},{wch:12}];
  ws1['!rows']=[{hpt:36},{hpt:20},{hpt:8},{hpt:20},{hpt:14},{hpt:32}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Summary');

  // ══════════════════════════════════════════════════════════
  // SHEET 2 — INVOICE REGISTER
  // ══════════════════════════════════════════════════════════
  const s2_data = [];
  s2_data.push([{v:`Invoice Register — ${monthLabel}`,s:hdrStyle(DARK,WHITE,14)},'','','','','','','','','','','','']);
  s2_data.push([{v:`${settings.shopName||'Tech-Pro+'}  ·  ${T_txns} transactions  ·  CA$${T_revenue.toFixed(2)}`,
    s:hdrStyle(DARK,GOLD,10,false)},'','','','','','','','','','','','']);
  s2_data.push([{v:''}]);

  const REG_HDRS = ['#','Invoice No.','Date','Customer','Phone',
    'Category','Payment','Subtotal','Discount','Taxable','Tax','TOTAL'];
  s2_data.push(REG_HDRS.map(h=>({v:h,s:hdrStyle()})));

  monthInvs.forEach((inv,idx)=>{
    const bg = idx%2===0 ? LIGHT : WHITE;
    const cat = inv.lines?.[0]
      ? (_productIndex.get(inv.lines[0].productId)?.category||'Repair')
      : 'Repair';
    s2_data.push([
      {v:idx+1,           s:dataStyle(false,'center',MUTED,bg)},
      {v:inv.number||'',  s:dataStyle(true,'left',EMERALD,bg)},
      {v:fmtDate(inv.date),s:dataStyle(false,'center',null,bg)},
      {v:inv.customerName||'Walk-in',s:dataStyle(false,'left',null,bg)},
      {v:inv.customerPhone||'',s:dataStyle(false,'left',MUTED,bg)},
      {v:cat,             s:dataStyle(false,'left',null,bg)},
      {v:inv.payment||'', s:dataStyle(false,'center',null,bg)},
      {v:inv.subtotal||0, s:moneyStyle(false,null,bg)},
      {v:inv.discount||0, s:{...moneyStyle(false,inv.discount?RED:MUTED,bg)}},
      {v:(inv.subtotal||0)-(inv.discount||0), s:moneyStyle(false,null,bg)},
      {v:inv.totalTax||inv.hst||0, s:moneyStyle(false,AMBER,bg)},
      {v:inv.total||0,    s:moneyStyle(true,EMERALD,bg)},
    ]);
  });

  // Totals row
  s2_data.push([
    {v:'',s:hdrStyle(EMERALD)},{v:'',s:hdrStyle(EMERALD)},{v:'',s:hdrStyle(EMERALD)},
    {v:'',s:hdrStyle(EMERALD)},{v:'',s:hdrStyle(EMERALD)},{v:'',s:hdrStyle(EMERALD)},
    {v:'TOTALS',s:hdrStyle(EMERALD)},
    {v:T_sub,  s:{...moneyStyle(true,WHITE,EMERALD)}},
    {v:T_disc, s:{...moneyStyle(true,WHITE,EMERALD)}},
    {v:T_sub-T_disc,s:{...moneyStyle(true,WHITE,EMERALD)}},
    {v:T_hst,  s:{...moneyStyle(true,WHITE,EMERALD)}},
    {v:T_revenue,s:{...moneyStyle(true,WHITE,EMERALD)}},
  ]);

  const ws2 = XLSX.utils.aoa_to_sheet(s2_data);
  ws2['!merges']=[
    {s:{r:0,c:0},e:{r:0,c:11}},
    {s:{r:1,c:0},e:{r:1,c:11}},
  ];
  ws2['!cols']=[{wch:5},{wch:16},{wch:14},{wch:22},{wch:15},{wch:18},{wch:14},{wch:13},{wch:12},{wch:13},{wch:11},{wch:14}];
  ws2['!freeze']={xSplit:0,ySplit:4};
  ws2['!autofilter']={ref:`A4:L4`};
  XLSX.utils.book_append_sheet(wb, ws2, 'Invoice Register');

  // ══════════════════════════════════════════════════════════
  // SHEET 3 — DAILY SALES
  // ══════════════════════════════════════════════════════════
  const s3_data=[];
  s3_data.push([{v:`Daily Sales — ${monthLabel}`,s:hdrStyle(DARK,WHITE,14)},'','','','','','']);
  s3_data.push([{v:''}]);

  const DAY_HDRS=['Date','Weekday','Revenue (CA$)','Transactions','Avg Ticket','Cumulative'];
  s3_data.push(DAY_HDRS.map(h=>({v:h,s:hdrStyle()})));

  const days=Object.keys(byDay).sort();
  let cumulative=0;
  days.forEach((d,idx)=>{
    const dd=byDay[d];
    const bg=idx%2===0?LIGHT:WHITE;
    const dateObj=new Date(d+'T12:00:00');
    cumulative+=dd.rev;
    s3_data.push([
      {v:new Date(d+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}),
        s:dataStyle(false,'left',null,bg)},
      {v:dateObj.toLocaleDateString('en-CA',{weekday:'long'}), s:dataStyle(false,'left',MUTED,bg)},
      {v:dd.rev,  s:moneyStyle(true,EMERALD,bg)},
      {v:dd.cnt,  s:dataStyle(false,'center',null,bg)},
      {v:dd.cnt?dd.rev/dd.cnt:0, s:moneyStyle(false,null,bg)},
      {v:cumulative, s:moneyStyle(false,DARK,bg)},
    ]);
  });

  // Total + avg rows
  const dailyAvg=days.length?T_revenue/days.length:0;
  s3_data.push([
    {v:'MONTHLY TOTAL',s:hdrStyle(EMERALD,WHITE,10,'left')},
    {v:'',s:hdrStyle(EMERALD)},
    {v:T_revenue,s:moneyStyle(true,WHITE,EMERALD)},
    {v:T_txns,   s:dataStyle(true,'center',WHITE,EMERALD)},
    {v:T_avg,    s:moneyStyle(true,WHITE,EMERALD)},
    {v:T_revenue,s:moneyStyle(true,WHITE,EMERALD)},
  ]);
  s3_data.push([
    {v:'Daily Average',s:dataStyle(false,'left',MUTED,LIGHT)},
    {v:'',s:dataStyle(false,'left',null,LIGHT)},
    {v:dailyAvg,s:moneyStyle(false,MUTED,LIGHT)},
    {v:T_txns/days.length,s:{...dataStyle(false,'center',null,LIGHT),numFmt:'0.0'}},
    {v:'',s:dataStyle(false,'left',null,LIGHT)},
    {v:'',s:dataStyle(false,'left',null,LIGHT)},
  ]);

  const ws3=XLSX.utils.aoa_to_sheet(s3_data);
  ws3['!merges']=[{s:{r:0,c:0},e:{r:0,c:5}}];
  ws3['!cols']=[{wch:18},{wch:14},{wch:17},{wch:15},{wch:17},{wch:18}];
  ws3['!freeze']={xSplit:0,ySplit:3};
  XLSX.utils.book_append_sheet(wb, ws3, 'Daily Sales');

  // ══════════════════════════════════════════════════════════
  // SHEET 4 — CRA TAX REPORT
  // ══════════════════════════════════════════════════════════
  const s4_data=[];
  s4_data.push([{v:'GST/HST Tax Report — Canada Revenue Agency',s:hdrStyle(RED,WHITE,14)},'','','','','']);
  s4_data.push([{v:`${settings.shopName||'Tech-Pro+'}  ·  GST/HST# ${settings.shopGST||'—'}  ·  ${monthLabel}`,
    s:hdrStyle(DARK,GOLD,10,false)},'','','','','']);
  s4_data.push([{v:''}]);

  const craLines=[
    ['Line 101','Total Sales & Other Revenue',T_sub],
    ['Line 103','HST Collected or Collectible',T_hst],
    ['Line 105','Total Tax and Adjustments for Period',T_hst],
    ['Line 106','Input Tax Credits (ITCs) — enter from records','← Enter'],
    ['Line 109','Net Tax Remittable (Line 105 − 106)','Calculate'],
  ];
  craLines.forEach(([line,desc,val],idx)=>{
    const bg=idx%2===0?LIGHT:WHITE;
    s4_data.push([
      {v:line,s:hdrStyle(DARK,WHITE,10)},
      {v:desc,s:dataStyle(false,'left',null,bg)},
      {v:'',  s:dataStyle(false,'left',null,bg)},
      {v:'',  s:dataStyle(false,'left',null,bg)},
      {v:typeof val==='number'?val:val,
       s:typeof val==='number'?moneyStyle(true,EMERALD,bg):dataStyle(true,'center',AMBER,bg)},
      {v:'',  s:dataStyle(false,'left',null,bg)},
    ]);
  });

  s4_data.push([{v:''}]);
  s4_data.push([{v:'MONTHLY TAX DETAIL',s:hdrStyle(EMERALD,WHITE,11)},'','','','','']);
  s4_data.push([
    {v:'Period',s:hdrStyle()},{v:'Gross Sales',s:hdrStyle()},{v:'Discounts',s:hdrStyle()},
    {v:'Net Taxable',s:hdrStyle()},{v:'HST 13%',s:hdrStyle()},{v:'HST Rate',s:hdrStyle()}
  ]);
  s4_data.push([
    {v:monthLabel, s:dataStyle(false,'left',null,LIGHT)},
    {v:T_sub,      s:moneyStyle(false,null,LIGHT)},
    {v:T_disc,     s:moneyStyle(false,null,LIGHT)},
    {v:T_sub-T_disc,s:moneyStyle(false,null,LIGHT)},
    {v:T_hst,      s:moneyStyle(true,EMERALD,LIGHT)},
    {v:0.13,       s:pctStyle(LIGHT)},
  ]);

  const ws4=XLSX.utils.aoa_to_sheet(s4_data);
  ws4['!merges']=[
    {s:{r:0,c:0},e:{r:0,c:5}},{s:{r:1,c:0},e:{r:1,c:5}},
    {s:{r:7,c:0},e:{r:7,c:5}},
    // CRA lines: col B-D merged for description
    ...craLines.map((_,i)=>({s:{r:3+i,c:1},e:{r:3+i,c:3}})),

  ];

function downloadCSV(filename, rows){
  const csv=rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
}

function exportTaxReportCSV(){
  const byMonth={};
  invoices.filter(i=>i.type!=='REFUND'&&i.type!=='STORE_CREDIT_ISSUED').forEach(inv=>{

    byMonth[m]=byMonth[m]||{gst:0,pst:0,hst:0,total:0,sales:0};
    byMonth[m].gst+=inv.gst||0; byMonth[m].pst+=inv.pst||0; byMonth[m].hst+=inv.hst||0;
    byMonth[m].total+=inv.totalTax||0; byMonth[m].sales+=inv.subtotal||0;
  });
  const rows=[['Month','Taxable Sales','GST','PST/QST','HST','Total Tax Collected']];
  Object.keys(byMonth).sort().forEach(m=>{

    rows.push([m, d.sales.toFixed(2), d.gst.toFixed(2), d.pst.toFixed(2), d.hst.toFixed(2), d.total.toFixed(2)]);
  });
  downloadCSV(`TaxReport_${today()}.csv`, rows);
}

function checkBackupReminder(){
  const last=localStorage.getItem('mshop_last_backup');
  if(!last){ // Never backed up
    if(invoices.length>0||customers.length>2){
      showBackupBanner('⚠️ You have live data but have never exported a backup. If this browser is cleared you will lose everything.');
    }
    return;
  }
  const daysSince=Math.floor((Date.now()-new Date(last).getTime())/86400000);
  if(daysSince>=7){
    showBackupBanner(`⚠️ Last backup was ${daysSince} day${daysSince!==1?'s':''} ago. Export a fresh backup to keep your data safe.`);
  }
}

function showBackupBanner(msg){

      <button onclick="document.getElementById('backup-reminder-banner').remove()" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:16px">✕</button>

function importData(e){
  const file=e.target.files[0];
  if(!file) return;
  if(!confirm('⚠️ This will REPLACE all your current data with the backup. Are you sure?')) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.version){ alert('Invalid backup file'); return; }
      if(data.settings) { Object.assign(settings,data.settings); DB.set('settings',settings); }
      if(data.products) { products=data.products; save('products',products); }
      if(data.customers) { customers=data.customers; save('customers',customers); }
      if(data.repairs) { repairs=data.repairs; save('repairs',repairs); }
      if(data.invoices) { invoices=data.invoices; save('invoices',invoices); }
      alert('✅ Backup restored successfully!');
      showPage('dashboard');
    }catch(err){ alert('Failed to parse backup file: '+err.message); }
  };
  reader.readAsText(file);
}

function renderCashUp(c){

    if(i.paymentSplit){ const cashPart=i.paymentSplit.find(p=>p.method==='Cash'); return s+(cashPart?cashPart.amount:0); }
    return s+(i.payment==='Cash'?i.total:0);
  },0);
  const cardSales=todayInvoices.filter(i=>['Debit','Credit Card'].includes(i.payment)).reduce((s,i)=>s+i.total,0);
  const etransferSales=todayInvoices.filter(i=>i.payment==='E-Transfer').reduce((s,i)=>s+i.total,0);
  const totalSales=todayInvoices.reduce((s,i)=>s+i.total,0);
  const todaySession=cashSessions.find(s=>s.date===todayStr);

  c.innerHTML=`
  <div style="max-width:640px">
    ${todaySession?`
    <div class="alert alert-green mb-3">✓ Today's cash-up was completed at ${new Date(todaySession.closedAt).toLocaleTimeString()}</div>
    `:''}

    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><div class="stat-label">Total Sales Today</div><div class="stat-value text-green">${fmt(totalSales)}</div><div class="stat-sub">${todayInvoices.length} invoices</div></div>
      <div class="stat-card"><div class="stat-label">Cash Sales</div><div class="stat-value">${fmt(cashSales)}</div></div>
      <div class="stat-card"><div class="stat-label">Card / Debit</div><div class="stat-value">${fmt(cardSales)}</div></div>
      <div class="stat-card"><div class="stat-label">E-Transfer</div><div class="stat-value">${fmt(etransferSales)}</div></div>
    </div>

    <div class="card mt-3">
      <div class="card-title">Cash Drawer Reconciliation</div>
      <div class="form-row">
        <div class="form-group">
          <label>Opening Float ($)</label>
          <input id="cu-float" type="number" value="${settings.cashFloat||200}"/>
        </div>
        <div class="form-group">
          <label>Expected Cash in Drawer</label>
          <input id="cu-expected" type="number" value="${(parseFloat(settings.cashFloat||200)+cashSales).toFixed(2)}" disabled style="opacity:.6"/>
        </div>
      </div>
      <div class="form-group">
        <label>Actual Cash Counted ($)</label>
        <input id="cu-actual" type="number" placeholder="Count the drawer and enter here" oninput="calcCashDiff()"/>
      </div>
      <div id="cash-diff-display" style="display:none" class="alert mt-2"></div>
      <div class="form-group mt-2">
        <label>Notes (optional)</label>
        <textarea id="cu-notes" placeholder="Any discrepancy notes…" rows="2"></textarea>
      </div>
      <button class="btn btn-primary w-full mt-2" onclick="closeCashSession()">🔒 Close & Record Cash-Up</button>
    </div>

    <div class="card mt-3">
      <div class="card-title">Recent Cash-Up History</div>
      ${cashSessions.length===0?'<p class="text-muted" style="font-size:13px">No cash-ups recorded yet</p>':
      cashSessions.slice().reverse().slice(0,10).map(s=>`
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span>${fmtDate(s.date)}</span>
        <span>Expected: ${fmt(s.expected)} / Actual: ${fmt(s.actual)}</span>
        <span class="${Math.abs(s.difference)<0.01?'text-green':'text-red'}">${s.difference>=0?'+':''}${fmt(s.difference)}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function calcCashDiff(){
  const expected=parseFloat(document.getElementById('cu-expected')?.value||0);
  const actual=parseFloat(document.getElementById('cu-actual')?.value||0);
  const diff=actual-expected;
  const el=document.getElementById('cash-diff-display');
  if(!el) return;
  if(document.getElementById('cu-actual')?.value===''){ el.style.display='none'; return; }
  el.style.display='block';
  el.className='alert mt-2 '+(Math.abs(diff)<0.01?'alert-green':diff>0?'alert-amber':'alert-red');
  el.textContent=Math.abs(diff)<0.01?'✓ Drawer matches exactly':
    diff>0?`Drawer has ${fmt(diff)} MORE than expected (overage)`:
    `Drawer has ${fmt(Math.abs(diff))} LESS than expected (shortage)`;
}

function closeCashSession(){
  const expected=parseFloat(document.getElementById('cu-expected')?.value||0);
  const actual=parseFloat(document.getElementById('cu-actual')?.value);
  if(isNaN(actual)){ alert('Enter the actual cash counted'); return; }
  const float=parseFloat(document.getElementById('cu-float')?.value||0);
  const diff=actual-expected;
  const session={
    id:uid(), date:today(), openFloat:float, expected, actual,
    difference:diff, notes:document.getElementById('cu-notes')?.value||'',
    closedAt:new Date().toISOString(), closedBy:currentStaff().name
  };
  // Remove any existing session for today, replace with new
  cashSessions=cashSessions.filter(s=>s.date!==today());
  cashSessions.push(session);
  save('cashSessions',cashSessions);
  settings.cashFloat=float; DB.set('settings',settings);
  addAudit('CASH_UP',`Cash-up closed: expected ${fmt(expected)}, actual ${fmt(actual)}, diff ${fmt(diff)}`);
  showAlert('global-alert','✅ Cash-up recorded for today','green');
  renderCashUp(document.getElementById('page-content'));
}

function updateRefundTotal(){
  const checked=document.querySelectorAll('.refund-line-cb:checked');
  let total=0;
  checked.forEach(cb=>{ total+=parseFloat(cb.dataset.price)*parseInt(cb.dataset.qty); });
  // Apply tax proportionally
  const taxResult=calcCanadianTax(total, settings.province||'ON');
  document.getElementById('refund-total-display').textContent=fmt(taxResult.total);
}

function processRefund(invId){
  const inv=invoices.find(i=>i.id===invId);
  const checked=document.querySelectorAll('.refund-line-cb:checked');
  if(checked.length===0){ alert('Select at least one item to refund'); return; }
  const method=document.getElementById('refund-method')?.value;
  const reason=document.getElementById('refund-reason')?.value;

  let refundLines=[];
  let restockItems=[];
  checked.forEach(cb=>{
    const idx=parseInt(cb.dataset.idx);
    const line=inv.lines[idx];
    refundLines.push(line);
    if(cb.dataset.restock){ restockItems.push({productId:cb.dataset.restock, qty:line.qty}); }
  });

  const subtotal=refundLines.reduce((s,l)=>s+l.price*l.qty,0);
  const taxResult=calcCanadianTax(subtotal, inv.province||settings.province||'ON');

  // Restock products
  restockItems.forEach(r=>{
    const p=_productIndex.get(r.productId);
    if(p){ p.stock+=r.qty; }
  });
  save('products',products);

  // Create refund record (negative invoice)
  const refundInv={
    id:uid(), number:'RFD-'+uid().slice(3,9).toUpperCase(), date:today(),
    type:'REFUND', originalInvoice:inv.number,
    customerId:inv.customerId, customerName:inv.customerName, customerPhone:inv.customerPhone,
    lines:refundLines, subtotal:-subtotal, discount:0,
    taxLines:taxResult.lines.map(l=>({...l,amount:-l.amount})),
    totalTax:-taxResult.totalTax, total:-taxResult.total,
    payment:method, reason, createdAt:new Date().toISOString()
  };
  invoices.push(refundInv);
  save('invoices',invoices);

  // Handle refund method
  if(method==='Store Credit' && inv.customerId){
    issueStoreCredit(inv.customerId, taxResult.total, `Refund — ${inv.number}`);
  }
  if(inv.customerId){
    const cust=_customerIndex.get(inv.customerId);
    if(cust){ cust.spent=Math.max(0,cust.spent-taxResult.total); save('customers',customers); }
  }

  addAudit('REFUND',`Refunded ${fmt(taxResult.total)} from ${inv.number} — reason: ${reason}`);
  closeModal();
  showAlert('global-alert',`✅ Refund of ${fmt(taxResult.total)} processed`,'green');
  renderRefunds(document.getElementById('page-content'));
}

function saveNewStaff(){
  const name=document.getElementById('as-name')?.value?.trim();
  const pin=document.getElementById('as-pin')?.value?.trim();
  if(!name||!/^\\d{4}$/.test(pin)){ alert('Name required, PIN must be exactly 4 digits'); return; }
  if(staff.find(s=>s.pin===pin)){ alert('This PIN is already in use'); return; }
  staff.push({ id:uid(), name, pin, role:document.getElementById('as-role')?.value||'cashier', active:true });
  save('staff',staff);
  addAudit('STAFF_ADD',`Added staff member: ${name}`);
  closeModal();
  renderStaff(document.getElementById('page-content'));
}

function editStaffMember(id){
  const s=staff.find(x=>x.id===id);
  if(!s) return;
  const html=`
  <div class="form-group"><label>Full Name</label><input id="es-name" value="${escH(s.name)}"/></div>
  <div class="form-row">
    <div class="form-group"><label>4-Digit PIN</label><input id="es-pin" value="${escH(s.pin)}" maxlength="4" style="font-family:var(--mono)"/></div>
    <div class="form-group"><label>Role</label>

      </select>
    </div>
  </div>`;
  openModal('Edit Staff Member', html, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEditStaff('${id}')">Save</button>`);
}

function saveEditStaff(id){
  const s=staff.find(x=>x.id===id);
  if(!s) return;
  s.name=document.getElementById('es-name')?.value||s.name;
  const newPin=document.getElementById('es-pin')?.value;

  s.role=document.getElementById('es-role')?.value||s.role;
  save('staff',staff);
  addAudit('STAFF_EDIT',`Edited staff member: ${s.name}`);

  renderStaff(document.getElementById('page-content'));

function toggleStaffActive(id){

function renderAuditLog(c){

  const ACTION_COLORS={
    LOGIN:'badge-blue', INVOICE_CREATE:'badge-green', REFUND:'badge-red',
    CASH_UP:'badge-purple', STORE_CREDIT:'badge-amber', LOYALTY:'badge-amber',

    HOLD_CART:'badge-gray', RECALL_CART:'badge-gray', EMAIL:'badge-blue', SETTINGS:'badge-gray'

  </div>
  <div class="search-bar">
    <input placeholder="Search action, detail, or staff name…" value="${escH(search)}"

  ${list.length===0?'<tr><td colspan="4" style="text-align:center;padding:30px;color:var(--text3)">No activity logged yet</td></tr>':
  list.map(a=>`<tr>
    <td style="font-size:11px;color:var(--text2);white-space:nowrap">${new Date(a.ts).toLocaleString()}</td>

// ── Settings: tabbed layout so only the active section renders ──
// Previously renderSettings generated ~16KB of HTML in one shot.
// Now each tab renders independently — opening Settings is instant,
// and switching tabs only costs one small section re-render.
let _settingsTab = 'shop'; // currently active tab

function renderSettings(c){
  c.innerHTML = `
  <div style="max-width:640px">
    <div class="tabs" style="margin-bottom:20px">
      <div class="tab ${_settingsTab==='shop'?'active':''}"     onclick="switchSettingsTab('shop')">🏪 Shop</div>
      <div class="tab ${_settingsTab==='tax'?'active':''}"      onclick="switchSettingsTab('tax')">🍁 Tax</div>
      <div class="tab ${_settingsTab==='invoice'?'active':''}"  onclick="switchSettingsTab('invoice')">🧾 Invoice</div>
      <div class="tab ${_settingsTab==='loyalty'?'active':''}"  onclick="switchSettingsTab('loyalty')">🏆 Loyalty</div>
      <div class="tab ${_settingsTab==='email'?'active':''}"    onclick="switchSettingsTab('email')">📧 Email</div>
      <div class="tab ${_settingsTab==='sms'?'active':''}"      onclick="switchSettingsTab('sms')">💬 SMS</div>
      <div class="tab ${_settingsTab==='cloud'?'active':''}"    onclick="switchSettingsTab('cloud')">☁️ Cloud</div>
      <div class="tab ${_settingsTab==='danger'?'active':''}"   onclick="switchSettingsTab('danger')">⚙️ System</div>
    </div>
    <div id="settings-tab-content"></div>
    <div id="settings-msg" style="margin-top:12px"></div>
  </div>`;
  renderSettingsTab(_settingsTab);
}

function switchSettingsTab(tab){
  _settingsTab = tab;
  document.querySelectorAll('.tabs .tab').forEach(el=>{
    el.classList.toggle('active', el.textContent.toLowerCase().includes(tab) || 
      (tab==='shop'&&el.textContent.includes('Shop'))||
      (tab==='tax'&&el.textContent.includes('Tax'))||
      (tab==='invoice'&&el.textContent.includes('Invoice'))||
      (tab==='loyalty'&&el.textContent.includes('Loyalty'))||
      (tab==='email'&&el.textContent.includes('Email'))||
      (tab==='cloud'&&el.textContent.includes('Cloud'))||
      (tab==='danger'&&el.textContent.includes('System'))
    );
  });
  renderSettingsTab(tab);
}

function renderSettingsTab(tab){
  const el = document.getElementById('settings-tab-content');
  if(!el) return;
  switch(tab){
    case 'shop':    el.innerHTML = renderSettingsShop(); break;
    case 'tax':     el.innerHTML = renderSettingsTax(); break;
    case 'invoice': el.innerHTML = renderSettingsInvoice(); break;
    case 'loyalty': el.innerHTML = renderSettingsLoyalty(); break;
    case 'email':   el.innerHTML = renderSettingsEmail(); break;
    case 'sms':     el.innerHTML = renderSettingsSMS(); break;
    case 'cloud':   el.innerHTML = renderSettingsCloud(); break;
    case 'danger':  el.innerHTML = renderSettingsDanger(); break;
  }
}

async function testSMS(){
  const proxy=settings.smsProxyUrl;
  const from=settings.smsFromPhone;
  if(!proxy||!from){ alert('Enter and save the proxy URL and From number first'); return; }
  const to=prompt('Enter your own mobile number to receive a test SMS (e.g. +14165551234):');
  if(!to) return;
  try {
    const resp=await fetch(proxy,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to,from,body:`Test SMS from ${settings.shopName} CRM — SMS notifications are working! 🎉`})});
    if(resp.ok){ showAlert('global-alert','✅ Test SMS sent! Check your phone','green'); }
    else { const e=await resp.json(); alert('SMS failed: '+(e.message||JSON.stringify(e))); }
  } catch(e){ alert('Failed to reach SMS proxy: '+e.message); }
}

function renderSettingsDanger(){
  const lastBackup = localStorage.getItem('mshop_last_backup');
  const daysSince = lastBackup ? Math.floor((Date.now()-new Date(lastBackup).getTime())/86400000) : null;
  return `
  <div class="card mb-3">
    <div class="card-title">💾 Data Backup & Restore</div>
    ${daysSince!==null
      ? `<div class="alert ${daysSince>=7?'alert-amber':'alert-green'}" style="margin-bottom:12px">
           Last backup: <strong>${daysSince===0?'Today':`${daysSince} day${daysSince!==1?'s':''} ago`}</strong>
           ${daysSince>=7?' — a new backup is overdue!':''}
         </div>`
      : `<div class="alert alert-red" style="margin-bottom:12px">⚠️ No backup ever exported. Export one now before adding real data.</div>`
    }
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Export all data as a JSON file. Keep it in Google Drive, email it to yourself, or both.</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="exportData()">⬇️ Export Backup (JSON)</button>
      <label class="btn btn-secondary" style="cursor:pointer">
        ⬆️ Restore from Backup
        <input type="file" accept=".json" style="display:none" onchange="importData(event)"/>
      </label>
    </div>
  </div>
  <div class="card mb-3">
    <div class="card-title">⚙️ System Settings</div>
    <div class="form-row">
      <div class="form-group"><label>Currency Symbol</label><input id="s-currency" value="${escH(settings.currency)}" style="max-width:80px"/></div>
      <div class="form-group"><label>Currency Code</label><input id="s-currcode" value="${escH(settings.currencyCode)}" style="max-width:80px"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Invoice Prefix</label><input id="s-prefix" value="${escH(settings.invoicePrefix)}" style="font-family:var(--mono)"/></div>
      <div class="form-group"><label>Next Invoice Number</label><input id="s-nextinv" type="number" value="${settings.nextInvoice}" style="font-family:var(--mono)"/></div>
    </div>
    <div class="form-group"><label>Opening Cash Float ($)</label><input id="s-float" type="number" value="${settings.cashFloat||200}" style="max-width:140px"/></div>
    <button class="btn btn-primary mt-2" onclick="saveSettings()">Save System Settings</button>
  </div>
  <div class="card" style="border-color:rgba(192,57,43,.3)">
    <div class="card-title text-red">Danger Zone</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">These actions are irreversible. Export a backup first!</p>
    <button class="btn btn-danger" onclick="clearAllData()">🗑️ Clear All Data & Reset</button>
  </div>`;

function manualIssueCredit(){
  const phone=document.getElementById('issue-credit-phone')?.value?.trim();
  const amt=parseFloat(document.getElementById('issue-credit-amt')?.value);
  const c=customers.find(x=>x.phone===phone);
  if(!c){ alert('No customer found with that phone number'); return; }
  if(isNaN(amt)||amt<=0){ alert('Enter a valid amount'); return; }
  issueStoreCredit(c.id, amt, 'Manual issue by staff');
  showAlert('global-alert',`✅ ${fmt(amt)} store credit issued to ${c.name}`,'green');
  document.getElementById('issue-credit-phone').value='';
  document.getElementById('issue-credit-amt').value='';
}
