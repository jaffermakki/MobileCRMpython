<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tech-Pro+ CRM</title>
<style>
:root{
  /* Posh light theme: warm white surfaces, deep emerald as the primary
     accent, a thin warm-gold hairline reserved for premium touches
     (active states, dividers on key totals) rather than loud gold blocks. */
  --bg:#fafaf8;--surface:#ffffff;--surface2:#f4f6f4;--surface3:#eef1ee;
  --border:#e6e8e3;--border2:#d7dbd2;
  --accent:#0f8b5f;--accent2:#0a6e49;--accent-glow:rgba(15,139,95,.10);
  --green:#0f8b5f;--green-bg:rgba(15,139,95,.10);
  --amber:#b8860b;--amber-bg:rgba(184,134,11,.10);
  --red:#c0392b;--red-bg:rgba(192,57,43,.09);
  --purple:#6b5b95;--purple-bg:rgba(107,91,149,.09);
  --gold:#b8964a;--gold-bg:rgba(184,150,74,.12);
  --text:#1a1d1a;--text2:#6b716a;--text3:#a3a89e;
  --radius:9px;--radius-lg:14px;
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:#c2c7bd}
/* ── Layout ────────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
/* Sidebar */
#sidebar{width:222px;flex-shrink:0;background:#0d1410;border-right:1px solid #1a2620;display:flex;flex-direction:column;padding:0}
.sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid #1a2620}
.sidebar-logo h1{font-size:15px;font-weight:700;color:#f5f5f0;letter-spacing:-.3px}
.sidebar-logo p{font-size:10.5px;color:var(--gold);margin-top:2px;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
.sidebar-logo .logo-icon{width:34px;height:34px;background:#000;border:1px solid #2a3a30;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;margin-bottom:12px;color:var(--gold);position:relative}
nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#8a9690;font-size:13px;font-weight:500;transition:background .12s,color .12s;margin-bottom:1px;border:1px solid transparent;position:relative}
.nav-item:hover{background:rgba(255,255,255,.04);color:#f5f5f0}
.nav-item.active{background:rgba(15,139,95,.16);color:#f5f5f0;border-color:rgba(15,139,95,.3)}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--gold);color:#0d1410;border-radius:999px;font-size:10px;padding:1px 6px;font-weight:700;font-family:var(--mono)}
.sidebar-bottom{padding:12px 8px;border-top:1px solid #1a2620}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.03)}
.user-avatar{width:28px;height:28px;border-radius:7px;background:#000;border:1px solid #2a3a30;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--gold);flex-shrink:0}
.user-info p{font-size:12px;font-weight:600;color:#f5f5f0}
.user-info span{font-size:10px;color:#5f6b62;font-family:var(--mono);letter-spacing:.4px}
/* Main content */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.topbar{padding:16px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0}
.topbar h2{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.topbar p{font-size:12px;color:var(--text2);margin-top:1px}
.topbar-actions{display:flex;gap:8px}
/* .page is the scroll container — flex:1 + min-height:0 is the key combo
   that makes overflow-y:auto actually work inside a flex parent */
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 26px;min-height:0;
      -webkit-overflow-scrolling:touch;scroll-behavior:smooth;
      will-change:scroll-position}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:filter .12s,background .12s;text-decoration:none;font-family:var(--font);white-space:nowrap}
.btn svg{width:14px;height:14px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--surface3)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(232,51,42,.3)}
.btn-danger:hover{background:rgba(232,51,42,.2)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(62,207,110,.3)}
.btn-green:hover{background:rgba(62,207,110,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.03);contain:layout style}
.card-title{font-size:11.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:3px;height:11px;background:var(--gold);border-radius:1px;display:inline-block}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden;transition:border-color .15s;contain:layout style}
.stat-card:hover{border-color:var(--border2)}
.stat-card::after{content:'';position:absolute;top:10px;right:10px;width:6px;height:6px;border-radius:50%;background:var(--border2)}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat-value{font-size:27px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums;font-family:var(--mono);letter-spacing:-.5px;color:var(--accent)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
/* Forms */
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);transition:border .12s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
input::placeholder{color:var(--text3)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* Tables */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:480px}
th{padding:11px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;background:var(--surface2);border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}
/* Badges — styled like the paper service tags zip-tied to a phone at
   intake: slight rotation, a notch, a soft drop shadow. The one place
   the shop's physical world shows up directly in the interface. */
.badge{display:inline-block;padding:3px 10px 3px 9px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.2px;position:relative;transform:rotate(-1deg);box-shadow:0 1px 2px rgba(0,0,0,.08);font-family:var(--mono)}
.badge::before{content:'';position:absolute;left:-1px;top:50%;width:4px;height:4px;background:var(--surface);border-radius:50%;transform:translateY(-50%);box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
.badge-blue{background:rgba(157,123,255,.15);color:var(--purple)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-gray{background:var(--surface3);color:var(--text2)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 70px rgba(0,0,0,.7)}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:700}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;border-radius:6px;display:flex}
.modal-close:hover{color:var(--text);background:var(--surface2)}
/* Alerts */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;border-left:3px solid transparent}
.alert-red{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.alert-green{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.alert-amber{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
/* POS specific */
.pos-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;min-height:0;flex:1}
.pos-left{display:flex;flex-direction:column;gap:12px;min-height:0;overflow:hidden}
.pos-right{display:flex;flex-direction:column;gap:12px;overflow-y:auto;min-height:0}
.cart-wrap{flex:1;overflow:hidden;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);display:flex;flex-direction:column;min-height:200px}
.cart-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.cart-body{flex:1;overflow-y:auto}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);gap:8px}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.cart-item-desc{flex:1;min-width:0}
.cart-item-desc p{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-desc span{font-size:11px;color:var(--text3);font-family:var(--mono)}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;transition:background .1s,border-color .1s}
.qty-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.qty-num{width:28px;text-align:center;font-weight:700;font-size:13px;font-family:var(--mono)}
.cart-total-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.total-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--text2)}
.total-row.grand{font-size:17px;font-weight:800;color:var(--text);padding-top:10px;margin-top:6px;border-top:2px solid var(--gold);font-family:var(--mono)}
.scan-bar{display:flex;gap:8px;align-items:center}
.scan-bar input{font-family:var(--mono);font-size:13px;background:var(--surface2);border-color:var(--accent);letter-spacing:.5px}
.scan-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Status pipeline — reads like a route card stamped at each station */
.pipeline{display:flex;gap:0;margin-bottom:16px;overflow-x:auto}
.pipeline-step{flex:1;min-width:80px;text-align:center;padding:8px 4px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:3px solid var(--border);color:var(--text3);cursor:default;font-family:var(--mono)}
.pipeline-step.done{border-color:var(--green);color:var(--green)}
.pipeline-step.active{border-color:var(--accent);color:var(--accent)}
/* Tabs */
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:18px}
.tab{flex:1;text-align:center;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:background .12s,color .12s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.5)}
/* Search bar */
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1}
/* Misc */
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.text-right{text-align:right}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-amber{color:var(--amber)}
.text-accent{color:var(--accent)}
.text-muted{color:var(--text2)}
.font-mono{font-family:var(--mono)}
.font-bold{font-weight:700}
.mt-2{margin-top:8px}
.mt-3{margin-top:12px}
.mb-3{margin-bottom:12px}
.flex{display:flex}
.flex-1{flex:1}
.items-center{align-items:center}
.gap-2{gap:8px}
.gap-3{gap:12px}
.w-full{width:100%}
/* ── Mobile responsive ─────────────────────────────────────
   Breakpoint: anything under 768px wide is treated as mobile.
   The sidebar collapses to a slide-in drawer, the POS stacks
   vertically, and grids switch to single-column. ─────────── */
@media (max-width: 768px){

  /* Sidebar becomes a full-height slide-in overlay */
  #sidebar{
    position:fixed; top:0; left:0; bottom:0; z-index:500;
    transform:translateX(-100%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
    width:260px;
    box-shadow:4px 0 24px rgba(0,0,0,.35);
  }
  #sidebar.mobile-open{ transform:translateX(0); }

  /* Sidebar overlay backdrop */
  #sidebar-backdrop{
    display:none; position:fixed; inset:0; z-index:499;
    background:rgba(0,0,0,.45); backdrop-filter:blur(2px);
  }
  #sidebar-backdrop.visible{ display:block; }

  /* Main takes full width */
  #main{ width:100%; overflow:hidden; }

  /* Topbar: hamburger left, title centre, actions right */
  .topbar{
    padding:12px 14px;
    display:grid;
    grid-template-columns:44px 1fr auto;
    align-items:center;
    gap:8px;
  }
  .topbar h2{ font-size:15px; }
  .topbar p{ display:none; } /* hide subtitle on mobile */
  #topbar-search-wrap{ display:none; } /* hide search bar in topbar on mobile */

  /* Page padding tighter on mobile */
  .page{ padding:14px 12px; }

  /* Stats grid: 2 columns on mobile */
  .stats-grid{ grid-template-columns:1fr 1fr; gap:10px; }
  .stat-value{ font-size:22px; }

  /* Form rows stack on mobile */
  .form-row, .form-row3{ grid-template-columns:1fr; }

  /* POS: stack cart on top, payment panel below */
  .pos-layout{
    grid-template-columns:1fr;
    grid-template-rows:auto auto;
    height:auto;
  }
  .pos-right{ order:-1; } /* payment/customer panel comes first */

  /* Tables: horizontal scroll */
  .table-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  table{ min-width:480px; }
  th, td{ padding:9px 10px; font-size:12px; }

  /* Cards tighter padding */
  .card{ padding:14px; }

  /* Buttons full-width where it makes sense */
  .btn.w-full{ width:100%; }

  /* Modal takes full screen on mobile */
  .modal-overlay{ padding:0; align-items:flex-end; }
  .modal{
    max-width:100%; width:100%; max-height:92vh;
    border-radius:16px 16px 0 0;
  }

  /* Quick actions: 2×2 grid */
  .quick-actions-grid{ grid-template-columns:1fr 1fr !important; }

  /* Bigger tap targets for nav items */
  .nav-item{ padding:12px 14px; font-size:14px; }

  /* Cloud banner smaller text */
  #cloud-banner{ font-size:10px; max-width:200px; }
}

/* Extra small phones (iPhone SE etc.) */
@media (max-width: 380px){
  .stats-grid{ grid-template-columns:1fr; }
  .pos-layout .scan-bar input{ font-size:12px; }
}

/* Hamburger button — only shown on mobile */
#mobile-menu-btn{
  display:none;
  background:none; border:none; cursor:pointer;
  padding:6px; border-radius:8px; color:var(--text);
  align-items:center; justify-content:center;
  transition:background .15s;
}
#mobile-menu-btn:active{ background:var(--surface2); }
@media (max-width:768px){ #mobile-menu-btn{ display:flex; } }

/* Hide topbar search input on mobile — use page-level search instead */
@media (max-width:768px){
  .topbar > div[style*="max-width:360px"]{ display:none !important; }
}

/* Print invoice */
@media print{
  body *{visibility:hidden}
  #print-area,#print-area *{visibility:visible}
  #print-area{position:fixed;top:0;left:0;width:100%;background:#fff;color:#000;padding:30px;font-family:'Arial',sans-serif}
  .no-print{display:none!important}
}
#print-area{display:none}
</style>

  <script>
// --- API CONNECTION BRIDGE ---
// Change this URL to your deployed Render URL later (e.g., https://my-crm-backend.render.com)
const API_BASE_URL = "http://localhost:8000"; 

const CRM_API = {
    // Get all products from Python
    getProducts: async () => {
        const res = await fetch(`${API_BASE_URL}/api/products`);
        return await res.json();
    },
    // Send a new product to Python
    addProduct: async (productData) => {
        const res = await fetch(`${API_BASE_URL}/api/products`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(productData)
        });
        return await res.json();
    },
    // Get all repair tickets from Python
    getTickets: async () => {
        const res = await fetch(`${API_BASE_URL}/api/tickets`);
        return await res.json();
    }
};

// Example: How you update your existing HTML buttons to use the new API
async function handleNewProductSubmit() {
    const data = {
        sku: document.getElementById('ap-sku').value,
        name: document.getElementById('ap-name').value,
        price: parseFloat(document.getElementById('ap-price').value),
        stock: parseInt(document.getElementById('ap-stock').value)
    };
    
    await CRM_API.addProduct(data);
    alert("Product saved securely to the database!");
}
</script>

// CLOUD CONFIG — Firebase Realtime Database
// Paste your credentials in Settings → Cloud Sync (no file
// editing needed — they save to this browser's storage).
// Get them free at https://console.firebase.google.com
// Leave blank to run in offline/local mode only.
// ══════════════════════════════════════════════════════════
function getFirebaseUrl(){ return localStorage.getItem('mshop_firebase_url') || ''; }
function getFirebaseSecret(){ return localStorage.getItem('mshop_firebase_secret') || ''; }
function setFirebaseCredentials(url, secret){
  localStorage.setItem('mshop_firebase_url', (url||'').trim().replace(/\/$/,''));
  localStorage.setItem('mshop_firebase_secret', (secret||'').trim());
}

let cloudMode = false;
let firebaseListeners = [];

/**
 * Firebase Realtime Database needs no client library for basic reads
 * and writes — any database URL works as a plain REST endpoint just by
 * appending ".json" to it. This sidesteps the entire class of CDN
 * loading / library-global-collision bugs that came up with Supabase.
 * Real-time push updates use Firebase's lightweight "Server-Sent Events"
 * streaming endpoint, also reachable over plain fetch with no SDK.
 */
async function initCloud(){
  const url = getFirebaseUrl();
  const secret = getFirebaseSecret();

  if(!url){ showCloudBanner('offline'); return; }

  if(!/^https:\/\/[a-z0-9-]+(\.firebaseio\.com|\.[a-z0-9-]+\.firebasedatabase\.app)\/?$/i.test(url)){
    showCloudBanner('error', `Database URL looks wrong: "${url}". It should look like https://your-project.firebaseio.com or https://your-project.region.firebasedatabase.app`);
    return;
  }

  try {
    // Test connection by reading the root node. An empty database
    // returns `null`, which is a perfectly valid, successful response —
    // it does not mean something is broken.
    const testUrl = buildFbUrl('/_health_check', { shallow: true });
    const resp = await fetch(testUrl);
    if(!resp.ok){
      const body = await resp.json().catch(()=>({}));
      if(resp.status === 401 || resp.status === 403){
        throw new Error(`Access denied (HTTP ${resp.status}). Your database security rules are blocking access, or the secret key is wrong. Check the rules in Firebase Console → Realtime Database → Rules. (${body.error||''})`);
      }
      throw new Error(`HTTP ${resp.status}: ${body.error||resp.statusText}`);
    }

    cloudMode = true;
    showCloudBanner('online');
    await syncFromCloud();
    subscribeRealtime();
    if(typeof addAudit === 'function') addAudit('CLOUD','Connected to Firebase successfully');
  } catch(e){
    cloudMode = false;
    console.error('[Cloud] init failed:', e);
    showCloudBanner('error', e.message || String(e));
  }
}

/**
 * Builds a full Firebase REST URL for a given database path.
 * path should start with '/', e.g. '/products/p1'
 * extraParams can include { shallow: true }, { auth: secret }, etc.
 */
function buildFbUrl(path, extraParams){
  const url = getFirebaseUrl();
  const secret = getFirebaseSecret();
  const params = new URLSearchParams();
  if(secret) params.set('auth', secret);
  if(extraParams){
    Object.entries(extraParams).forEach(([k,v])=>{
      if(v === true) params.set(k,'true');
      else if(v !== undefined && v !== null) params.set(k, String(v));
    });
  }
  const qs = params.toString();
  return `${url}${path}.json${qs?'?'+qs:''}`;
}

/**
 * Loads an external script once. Used by the email-receipt feature
 * (EmailJS) — Firebase itself no longer needs this, since its REST API
 * works directly over fetch with no client library required.
 */
function loadScript(src){
  return new Promise((resolve, reject) => {
    if(document.querySelector(`script[src="${src}"]`)){ resolve(); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('Failed to load script: '+src));
    document.head.appendChild(s);
  });
}

function showCloudBanner(state, msg=''){
  let el=document.getElementById('cloud-banner');
  if(!el){
    el=document.createElement('div');
    el.id='cloud-banner';
    el.style.cssText='position:fixed;bottom:14px;right:14px;z-index:9999;padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(0,0,0,.5);max-width:360px;cursor:pointer;font-family:var(--mono);letter-spacing:.2px;backdrop-filter:blur(8px)';
    document.body.appendChild(el);
  }
  const configs={
    online:  {bg:'rgba(62,207,110,.12)',border:'rgba(62,207,110,.35)',color:'#3ecf6e', icon:'●', text:'CLOUD SYNC ACTIVE'},
    offline: {bg:'rgba(82,82,82,.18)',border:'rgba(82,82,82,.4)',color:'#8f8f8f', icon:'○', text:'LOCAL MODE'},
    syncing: {bg:'rgba(232,51,42,.10)',border:'rgba(232,51,42,.3)',color:'#e8332a', icon:'◐', text:'SYNCING…'},
    error:   {bg:'rgba(232,51,42,.14)',border:'rgba(232,51,42,.4)',color:'#e8332a', icon:'⚠', text:'CLOUD ERROR — TAP FOR DETAILS'},
  };
  const c=configs[state]||configs.offline;
  el.style.background=c.bg;
  el.style.border=`1px solid ${c.border}`;
  el.style.color=c.color;
  window._lastCloudError = state==='error' ? msg : '';
  el.innerHTML=`${c.icon} ${state==='error'?c.text:c.text+(msg?` — ${msg.slice(0,50)}`:'')}`;
  el.onclick = state==='error' ? ()=>alert('Cloud Sync Error:\n\n'+msg) : null;
}

// ── Collection helpers ─────────────────────────────────────
// Each "table" maps to a top-level node in the Firebase tree, e.g.
// /crm_products/{id} = the product object itself (no wrapping needed,
// unlike the key-value-with-jsonb-blob approach Postgres required).

async function cloudGetAll(collection){
  if(!cloudMode) return null;
  try {
    const resp = await fetch(buildFbUrl(`/${collection}`));
    if(!resp.ok) return null;
    const data = await resp.json();
    if(!data) return [];
    // Firebase returns an object keyed by id; convert back to an array.
    return Object.values(data);
  } catch(e){ console.warn(`cloudGetAll(${collection}) failed:`, e); return null; }
}

async function cloudGet(collection, id){
  if(!cloudMode) return null;
  try {
    const resp = await fetch(buildFbUrl(`/${collection}/${id}`));
    if(!resp.ok) return null;
    return await resp.json();
  } catch(e){ return null; }
}

async function cloudSet(collection, id, val){
  if(!cloudMode) return;
  try {
    await fetch(buildFbUrl(`/${collection}/${id}`), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(val)
    });
  } catch(e){ console.warn(`cloudSet(${collection}/${id}) failed:`, e); }
}

async function cloudSetAll(collection, arr){
  if(!cloudMode || !arr) return;
  try {
    // Build an object keyed by each item's id, then PUT the whole
    // collection in one request — far fewer round trips than one
    // request per item, and Firebase merges/overwrites cleanly.
    const obj = {};
    arr.forEach(item=>{ if(item && item.id) obj[item.id] = item; });
    await fetch(buildFbUrl(`/${collection}`), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(obj)
    });
  } catch(e){ console.warn(`cloudSetAll(${collection}) failed:`, e); }
}

// ── Real-time subscriptions ────────────────────────────────
// Firebase's REST API supports Server-Sent Events for live updates —
// no client library or websocket handshake code needed.
function subscribeRealtime(){
  if(!cloudMode) return;
  // Clean up any previous listeners before creating new ones (avoids
  // duplicate listeners piling up if initCloud runs more than once).
  firebaseListeners.forEach(es=>es.close());
  firebaseListeners = [];

  ['crm_customers','crm_invoices','crm_repairs'].forEach(collection=>{
    try {
      const es = new EventSource(buildFbUrl(`/${collection}`));
      es.addEventListener('put', async ()=>{
        showCloudBanner('syncing');
        await syncFromCloud();
        showCloudBanner('online');
        if(['dashboard','customers','repairs'].includes(currentPage)){
          renderPage(currentPage);
        }
      });
      es.onerror = ()=>{ /* Firebase auto-reconnects; nothing to do here */ };
      firebaseListeners.push(es);
    } catch(e){ console.warn(`Realtime subscribe failed for ${collection}:`, e); }
  });
}

// ── Full sync: cloud → local ───────────────────────────────
async function syncFromCloud(){
  try {
    const [sets, prods, custs, reps, invs, stf, sessions, log] = await Promise.all([
      cloudGet('crm_settings','__settings__'),
      cloudGetAll('crm_products'),
      cloudGetAll('crm_customers'),
      cloudGetAll('crm_repairs'),
      cloudGetAll('crm_invoices'),
      cloudGetAll('crm_staff'),
      cloudGetAll('crm_cashsessions'),
      cloudGetAll('crm_auditlog'),
    ]);
    if(sets){ Object.assign(settings, sets); DB.set('settings', settings); }
    if(prods && prods.length){ products=prods; DB.set('products',products); }
    if(custs && custs.length){ customers=custs; DB.set('customers',customers); }
    if(reps  && reps.length) { repairs=reps;   DB.set('repairs',repairs); }
    if(invs  && invs.length) { invoices=invs;  DB.set('invoices',invoices); }
    if(stf   && stf.length)  { staff=stf;      DB.set('staff',staff); }
    if(sessions && sessions.length){ cashSessions=sessions; DB.set('cashSessions',cashSessions); }
    if(log   && log.length)  { auditLog=log;   DB.set('auditLog',auditLog); }
    rebuildIndexes();
    updateBadges();
  } catch(e){ console.warn('Sync error:', e); }
}

// ── Save wrapper: local + cloud ────────────────────────────
// ── Debounce helper ────────────────────────────────────────
// Delays rapid-fire saves (e.g. typing in a search box) so we
// don't hammer Firebase with a write on every keystroke.
const _debounceTimers={};
function debounce(key, fn, delay=800){
  clearTimeout(_debounceTimers[key]);
  _debounceTimers[key]=setTimeout(fn, delay);
}

// ── Save: local + cloud ────────────────────────────────────
// Cloud writes are fire-and-forget (non-blocking) — the UI
// never waits for Firebase before continuing. If a write fails
// it's logged to console and retried on the next manual sync.
function save(key, val){
  DB.set(key, val);
  // Keep O(1) lookup indexes in sync whenever data changes
  if(key==='products' || key==='customers') rebuildIndexes();
  if(!cloudMode) return;
  // Debounce heavy collections so rapid updates (e.g. scanning
  // items into cart) batch into one upload instead of many.
  const heavy = ['products','invoices','repairs','auditLog'];
  const delay = heavy.includes(key) ? 1200 : 0;
  debounce('save_'+key, ()=>{
    _cloudSave(key, val).catch(e=>console.warn('[Cloud] save error:', e));
  }, delay);
}

async function _cloudSave(key, val){
  switch(key){
    case 'settings':
      await cloudSet('crm_settings','__settings__', val); break;
    // Per-item writes for large collections: only writes the
    // changed collection, not a giant batch of everything.
    case 'products':
      await cloudSetAll('crm_products', val); break;
    case 'customers':
      await cloudSetAll('crm_customers', val); break;
    case 'repairs':
      await cloudSetAll('crm_repairs', val); break;
    case 'invoices':
      await cloudSetAll('crm_invoices', val); break;
    case 'staff':
      await cloudSetAll('crm_staff', val); break;
    case 'cashSessions':
      await cloudSetAll('crm_cashsessions', val); break;
    case 'auditLog':
      await cloudSetAll('crm_auditlog', val); break;
    case 'heldCarts':
      await cloudSetAll('crm_heldcarts', val); break;
  }
}

async function runCloudDiagnostic(){
  const url = getFirebaseUrl();
  const secret = getFirebaseSecret();
  const resultEl = document.getElementById('diagnostic-result');
  if(resultEl) resultEl.innerHTML = '<p style="color:var(--text2)">Running diagnostic…</p>';

  if(!url){
    if(resultEl) resultEl.innerHTML = '<div class="alert alert-red">No Database URL saved yet — enter it above first.</div>';
    return;
  }

  let report = [];
  report.push(`<strong>Database URL:</strong> ${escH(url)}`);
  report.push(`<strong>Secret key provided:</strong> ${secret ? 'Yes' : 'No (using public rules only)'}`);

  try {
    const resp = await fetch(buildFbUrl('/'));
    const body = await resp.json().catch(()=>null);
    report.push(`<strong>HTTP Status:</strong> ${resp.status} ${resp.statusText}`);
    report.push(`<strong>Raw response:</strong><pre style="background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:10px;font-size:11px;overflow-x:auto;margin-top:6px">${escH(JSON.stringify(body,null,2))}</pre>`);

    if(resp.ok){
      report.push('<div class="alert alert-green mt-2">✅ Your database is reachable right now. If the app still shows an error, click "Save & Connect" again to retest.</div>');
    } else if(resp.status === 401 || resp.status === 403){
      report.push('<div class="alert alert-red mt-2">Access denied — your security rules are blocking this request. Use the "🔧 Fix Access Denied Error" button below.</div>');
    } else {
      report.push(`<div class="alert alert-red mt-2">Unexpected response. Double-check the Database URL is exactly correct.</div>`);
    }
  } catch(e){
    report.push(`<div class="alert alert-red mt-2">Network-level error: ${escH(e.message)}. This usually means the Database URL is wrong/unreachable, or the request was blocked (CORS, ad-blocker, or firewall).</div>`);
  }

  if(resultEl) resultEl.innerHTML = report.join('<div style="margin:8px 0"></div>');
}

// UNIQUE INVOICE NUMBER SYSTEM
// Format: PREFIX-YYYY-NNNN  e.g.  INV-2025-0042
// Guaranteed unique: sequential counter stored in settings,
// never reused, visible year prefix for filing.
// ══════════════════════════════════════════════════════════
function generateInvoiceNumber(){
  const year = new Date().getFullYear();
  // Reset counter if fiscal year changed
  if(settings._invoiceYear !== year){
    settings._invoiceYear = year;
    settings.nextInvoice = 1;
  }
  const num = String(settings.nextInvoice).padStart(4,'0');
  settings.nextInvoice++;
  DB.set('settings', settings);
  if(cloudMode) cloudSet('crm_settings','__settings__', settings).catch(()=>{});
  return `${settings.invoicePrefix}-${year}-${num}`;
}

// CANADIAN TAX TABLE (2024 rates)
// GST = federal 5% always applied on top of pre-tax price
// PST / QST = provincial, varies by province
// HST provinces (ON, NB, NS, NL, PE) combine both into one rate
// ══════════════════════════════════════════════════════════
const CA_PROVINCES = {
  // Province: { label, taxType, gst, pst, hst }
  // taxType: 'HST' = single harmonised, 'GST+PST' = two separate lines, 'GST' = federal only
  'AB': { label:'Alberta (AB)',           taxType:'GST',     gst:5,    pst:0,    hst:0  },
  'BC': { label:'British Columbia (BC)',  taxType:'GST+PST', gst:5,    pst:7,    hst:0  },
  'MB': { label:'Manitoba (MB)',          taxType:'GST+PST', gst:5,    pst:7,    hst:0  },
  'NB': { label:'New Brunswick (NB)',     taxType:'HST',     gst:0,    pst:0,    hst:15 },
  'NL': { label:'Newfoundland (NL)',      taxType:'HST',     gst:0,    pst:0,    hst:15 },
  'NS': { label:'Nova Scotia (NS)',       taxType:'HST',     gst:0,    pst:0,    hst:15 },
  'NT': { label:'Northwest Territories', taxType:'GST',     gst:5,    pst:0,    hst:0  },
  'NU': { label:'Nunavut',               taxType:'GST',     gst:5,    pst:0,    hst:0  },
  'ON': { label:'Ontario (ON)',           taxType:'HST',     gst:0,    pst:0,    hst:13 },
  'PE': { label:'P.E.I. (PE)',           taxType:'HST',     gst:0,    pst:0,    hst:15 },
  'QC': { label:'Quebec (QC)',           taxType:'GST+QST', gst:5,    pst:9.975,hst:0  },
  'SK': { label:'Saskatchewan (SK)',      taxType:'GST+PST', gst:5,    pst:6,    hst:0  },
  'YT': { label:'Yukon',                 taxType:'GST',     gst:5,    pst:0,    hst:0  },
};

/**
 * Calculate Canadian taxes on a taxable amount.
 * Returns { gst, pst, hst, totalTax, total, lines[] }
 * lines[] is what prints on the invoice — e.g. ['GST 5% $x', 'PST 7% $x']
 */
function calcCanadianTax(taxable, provinceCode){
  const p = CA_PROVINCES[provinceCode] || CA_PROVINCES['ON'];
  const r = n => Math.round(n * 100) / 100;
  if(p.taxType === 'HST'){
    const hst = r(taxable * p.hst / 100);
    return { gst:0, pst:0, hst, totalTax:hst, total:taxable+hst,
      lines:[{ label:`HST ${p.hst}%`, amount:hst }] };
  }
  if(p.taxType === 'GST+PST'){
    const gst = r(taxable * p.gst / 100);
    const pst = r(taxable * p.pst / 100);
    return { gst, pst, hst:0, totalTax:gst+pst, total:taxable+gst+pst,
      lines:[{ label:`GST ${p.gst}%`, amount:gst }, ...(p.pst?[{ label:`PST ${p.pst}%`, amount:pst }]:[]) ] };
  }
  if(p.taxType === 'GST+QST'){
    const gst = r(taxable * p.gst / 100);
    // QST is applied on the pre-tax amount (not on top of GST) in Quebec
    const qst = r(taxable * p.pst / 100);
    return { gst, pst:qst, hst:0, totalTax:gst+qst, total:taxable+gst+qst,
      lines:[{ label:`GST ${p.gst}%`, amount:gst }, { label:`QST ${p.pst}%`, amount:qst }] };
  }
  // GST only (AB, NT, NU, YT)
  const gst = r(taxable * p.gst / 100);
  return { gst, pst:0, hst:0, totalTax:gst, total:taxable+gst,
    lines:[{ label:`GST ${p.gst}%`, amount:gst }] };
}

// Instead of calling products.find(x=>x.id===id) inside every map() loop
// (which is O(n) per lookup, O(n²) total), we build a Map once and
// rebuild it only when products/customers actually change.

  if(d) d.textContent=pinBuffer.replace(/./g,'●').padEnd(4,'_');
  if(pinBuffer.length===4){
    const found=checkPin(pinBuffer);
    if(found){
      settings.currentStaffId=found.id;
      settings._sessionStart=Date.now();
      DB.set('settings',settings);
      addAudit('LOGIN',`Staff login: ${found.name}`,found.id);
      pinBuffer='';
      closeModal();
      if(typeof updateStaffDisplay==='function') updateStaffDisplay();
      showPage('dashboard');
    } else {
      const e=document.getElementById('pin-error');
      if(e) e.textContent='Incorrect PIN. Try again.';
      setTimeout(()=>{ pinBuffer=''; if(d) d.textContent='____'; if(e) e.textContent=''; },1200);
    }
  }
}

function issueStoreCredit(customerId, amount, reason){
  const c=customers.find(x=>x.id===customerId);
  if(!c) return;
  c.storeCredit=(c.storeCredit||0)+amount;
  save('customers',customers);
  addAudit('STORE_CREDIT',`Issued ${fmt(amount)} store credit to ${c.name} — ${reason}`);
  invoices.push({
    id:uid(), number:'SC-'+uid().slice(3,9).toUpperCase(), date:today(),
    type:'STORE_CREDIT_ISSUED',
    customerId, customerName:c.name, customerPhone:c.phone||'',
    amount, reason, createdAt:new Date().toISOString(),
    lines:[{name:`Store Credit — ${reason}`,qty:1,price:amount,sku:'SC'}],
    subtotal:amount, discount:0, tax:0, taxLines:[], totalTax:0, total:amount,
    payment:'Store Credit', tendered:0, change:0
  });
  save('invoices',invoices);
  return c.storeCredit;
}

function redeemStoreCredit(customerId, amount){
  const c=customers.find(x=>x.id===customerId);
  if(!c||(c.storeCredit||0)<amount) return false;
  c.storeCredit=(c.storeCredit||0)-amount;
  save('customers',customers);
  addAudit('STORE_CREDIT',`Redeemed ${fmt(amount)} store credit for ${c.name}`);
  return true;
}

function redeemLoyaltyAsCredit(customerId, points){
  const c=customers.find(x=>x.id===customerId);
  if(!c||c.points<points) return false;
  const dollarValue=points/settings.pointsRedeemRate;
  c.points-=points;
  c.storeCredit=(c.storeCredit||0)+dollarValue;
  save('customers',customers);
  addAudit('LOYALTY',`Redeemed ${points} points for ${fmt(dollarValue)} store credit — ${c.name}`);
  return dollarValue;
}

// SMS NOTIFICATIONS — Twilio
// Sends "Ready for Pickup" SMS automatically when a repair
// is moved to READY status (via Kanban drag or status button).
// Falls back to a pre-filled WhatsApp link on mobile if
// Twilio is not configured — no API key needed for that path.
// ══════════════════════════════════════════════════════════

/**
 * Send an SMS via Twilio when a repair is marked Ready.
 * Requires a small serverless proxy (Cloudflare Worker or
 * Netlify Function) because browsers can't call Twilio directly
 * due to CORS/auth restrictions. The proxy URL and phone number
 * are stored in Settings → SMS. See Settings for setup guide.
 */
async function sendReadySMS(r){
  const phone=r.phone||r.customerPhone||'';
  if(!phone) return;

  const smsProxy=settings.smsProxyUrl||'';
  const fromPhone=settings.smsFromPhone||'';
  const deviceName=r.device||'your device';
  const shopName=settings.shopName||'Tech-Pro+';
  const message=`Hi ${escH(r.customerName||'')}, great news! Your ${deviceName} repair is complete and ready for pickup at ${shopName}. Ticket #${r.ticketNo}. See you soon!`;

  if(smsProxy){
    // Configured: send via Twilio proxy
    try {
      const resp=await fetch(smsProxy, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({to:phone, from:fromPhone, body:message})
      });
      if(resp.ok){
        if(typeof addAudit==='function') addAudit('SMS',`Ready SMS sent to ${phone} for repair #${r.ticketNo}`);
        showAlert('global-alert',`✅ SMS sent to ${phone}`, 'green');
        return;
      }
    } catch(e){
      console.warn('SMS failed via proxy:', e);
    }
  }

  // Fallback: open WhatsApp (works on mobile without any API key)
  // or offer to copy the message text
  const waNumber=phone.replace(/\D/g,'');
  const waMsg=encodeURIComponent(message);
  const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);

  if(isMobile){
    // On mobile, offer WhatsApp directly
    const useWA=confirm(`SMS gateway not configured.\n\nSend via WhatsApp instead?\n\nMessage:\n"${message}"`);
    if(useWA) window.open(`https://wa.me/${waNumber}?text=${waMsg}`, '_blank');
  } else {
    // On desktop, show a modal with the message to copy/paste
    openModal('📱 Send Ready Notification',`
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px">SMS gateway is not yet set up. You can send this message manually or via WhatsApp:</p>
      <div style="background:var(--surface2);border-radius:8px;padding:12px;font-size:13px;line-height:1.6;margin-bottom:12px">${message}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="navigator.clipboard.writeText('${message.replace(/'/g,"\\'")}');this.textContent='✓ Copied!';setTimeout(()=>this.textContent='Copy Message',2000)">Copy Message</button>
        <a href="https://wa.me/${waNumber}?text=${waMsg}" target="_blank" class="btn btn-secondary btn-sm">Open in WhatsApp</a>
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">Dismiss</button>
      </div>`,
      '', false);
  }
}

// EMAIL RECEIPT — EmailJS
// ══════════════════════════════════════════════════════════
async function sendEmailReceipt(inv, toEmail){
  if(!settings.emailjsPublicKey||!settings.emailjsServiceId||!settings.emailjsTemplateId){
    showAlert('global-alert','Email not configured — go to Settings → Email to set up EmailJS','amber');
    return false;
  }
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js');
    window.emailjs.init(settings.emailjsPublicKey);
    const taxSummary=inv.taxLines?inv.taxLines.map(t=>`${t.label}: ${fmt(t.amount)}`).join(' | '):'';
    const lineItems=inv.lines.map(l=>`${l.name} ×${l.qty} — ${fmt(l.price*l.qty)}`).join('\n');
    await window.emailjs.send(settings.emailjsServiceId, settings.emailjsTemplateId, {
      to_email: toEmail,
      to_name: inv.customerName||'Valued Customer',
      shop_name: settings.shopName,
      shop_address: settings.shopAddress,
      shop_phone: settings.shopPhone,
      invoice_number: inv.number,
      invoice_date: fmtDate(inv.date),
      line_items: lineItems,
      subtotal: fmt(inv.subtotal),
      discount: inv.discount?fmt(inv.discount):'$0.00',
      tax_summary: taxSummary,
      total: fmt(inv.total),
      payment_method: inv.payment,
      gst_number: settings.shopGST||'',
    });
    addAudit('EMAIL',`Receipt emailed to ${toEmail} for invoice ${inv.number}`);
    showAlert('global-alert',`✅ Receipt sent to ${toEmail}`,'green');
    return true;
  } catch(e){
    showAlert('global-alert','Email failed: '+e.message,'red');
    return false;
  }
}

// Scroll position memory — remember where user was on each page
const _scrollMemory = {};

function saveScrollPos(){
  const pc = document.getElementById('page-content');
  if(pc && currentPage) _scrollMemory[currentPage] = pc.scrollTop;
}

function restoreScrollPos(page){
  const pc = document.getElementById('page-content');
  if(!pc) return;
  // Use requestAnimationFrame to restore after DOM has painted
  requestAnimationFrame(()=>{
    pc.scrollTop = _scrollMemory[page] || 0;
  });
}

function showPage(p){
  // Save scroll position of current page before leaving
  saveScrollPos();
  // Close mobile sidebar when navigating
  closeMobileSidebar();
  currentPage=p;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+p);
  if(nav) nav.classList.add('active');
  const [title,sub]=PAGE_TITLES[p]||[p,''];
  document.getElementById('page-title').textContent=title;
  document.getElementById('page-sub').textContent=sub;
  document.getElementById('topbar-actions').innerHTML=PAGE_ACTIONS[p]||'';
  renderPage(p);
  updateBadges();
}

function renderPage(p){
  const c=document.getElementById('page-content');
  const pages={
    dashboard:renderDashboard, pos:renderPOS, repairs:renderRepairsNew,
    inventory:renderInventory, customers:renderCustomers,
    reports:renderReports, cashup:renderCashUp, refunds:renderRefunds,
    staff:renderStaff, audit:renderAuditLog, settings:renderSettings
  };
  // Always scroll to top when switching pages so content starts at top
  if(c) c.scrollTop=0;
  if(pages[p]) pages[p](c);
}

          <span style="font-weight:700;font-size:13px">Cart</span>
          <span id="cart-count" style="font-size:12px;color:var(--text2)">0 items</span>
        </div>
        <div class="cart-body" id="cart-body">
          <div class="cart-empty">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
            <p style="font-size:13px">Cart is empty</p>
            <p style="font-size:11px">Scan a barcode or browse products</p>
          </div>
        </div>
      </div>
    </div>
    <div class="pos-right">
      <!-- Customer -->
      <div class="card" style="padding:14px">
        <div class="card-title" style="margin-bottom:10px">Customer</div>
        <div id="customer-panel">
          <div style="display:flex;gap:8px">
            <input id="cust-search" placeholder="Phone number…" style="flex:1;font-family:var(--mono)"

            <button class="btn btn-secondary btn-sm" onclick="lookupCustomer()">Find</button>
          </div>
          <div id="cust-result" style="margin-top:10px"></div>
        </div>
      </div>
      <!-- Totals -->
      <div class="cart-total-panel">
        <div class="total-row"><span>Subtotal (before tax)</span><span id="pos-sub">${fmt(0)}</span></div>
        <div class="total-row" style="align-items:center">
          <span>Discount ($)</span>
          <input id="pos-disc" type="number" min="0" placeholder="0"
            style="width:80px;text-align:right;padding:3px 8px;font-size:13px"
            oninput="calcTotals()"/>
        </div>
        <div id="pos-tax-lines"></div>
        <div class="total-row grand"><span>TOTAL (CAD)</span><span id="pos-total">${fmt(0)}</span></div>
        <!-- Loyalty & Store Credit redemption -->
        <div id="loyalty-panel" style="margin-top:8px;display:none">
          <div style="background:var(--surface2);border-radius:8px;padding:10px;font-size:12px">
            <p style="color:var(--text2);margin-bottom:6px;font-weight:600">🏆 Loyalty & Store Credit</p>
            <div id="loyalty-info"></div>
            <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
              <button class="btn btn-secondary btn-sm" onclick="redeemPointsAtPOS()" id="redeem-pts-btn">Redeem Points</button>
              <button class="btn btn-secondary btn-sm" onclick="redeemStoreCreditAtPOS()" id="redeem-sc-btn">Use Store Credit</button>
            </div>
            <div id="redemption-applied" style="margin-top:6px"></div>
          </div>
        </div>
      </div>
      <!-- Payment -->
      <div class="card" style="padding:14px">
        <div class="form-group" style="margin-bottom:8px">
          <label>Primary Payment</label>
          <select id="pay-method">
            <option value="Cash">💵 Cash</option>
            <option value="Debit">💳 Debit</option>
            <option value="Credit Card">💳 Credit Card</option>
            <option value="E-Transfer">📱 E-Transfer (Interac)</option>
            <option value="Store Credit">🏷️ Store Credit (full)</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:8px">
          <label>Amount Tendered ($)</label>
          <input id="pay-tendered" type="number" placeholder="0.00" oninput="calcChange()"/>
        </div>
        <!-- Split payment -->
        <div style="background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:10px">
          <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);display:block;margin-bottom:6px">Split Payment (optional)</label>
          <div style="display:flex;gap:6px">
            <select id="split-method" style="flex:1;font-size:12px;padding:5px">
              <option value="">+ Add second method</option>
              <option value="Cash">Cash</option>
              <option value="Debit">Debit</option>
              <option value="Credit Card">Credit Card</option>
              <option value="E-Transfer">E-Transfer</option>
              <option value="Store Credit">Store Credit</option>
            </select>
            <input id="split-amount" type="number" placeholder="$0" style="width:70px;font-size:12px;padding:5px;text-align:right"/>
          </div>
        </div>
        <div id="change-display" style="display:none" class="alert alert-green" style="margin-bottom:8px">
          Change: <strong id="change-amt"></strong>
        </div>
        <button class="btn btn-primary w-full" onclick="completeSale()" style="font-size:14px;padding:10px">
          ✓ Complete Sale
        </button>
        <div style="display:flex;gap-6px;gap:6px;margin-top:8px">
          <button class="btn btn-secondary btn-sm flex-1" onclick="holdCart()">⏸ Hold Cart</button>
          <button class="btn btn-secondary btn-sm flex-1" onclick="recallHeldCart()">📋 Recall</button>
          <button class="btn btn-secondary btn-sm" onclick="clearCart()">✕</button>
        </div>
      </div>
    </div>
  </div>`;
  renderCart();
}

function scanSku(){
  const input=document.getElementById('sku-input');
  const sku=(input.value||'').trim().toUpperCase();
  if(!sku) return;
  const p=products.find(x=>x.sku.toUpperCase()===sku||x.name.toUpperCase().includes(sku));
  if(!p){ showAlert('sku-alert',`No product found for "${sku}"`,'red'); input.value=''; return; }
  addToCart(p);
  input.value='';
  input.focus();
}

function addToCart(p){
  if(p.stock<=0){ alert(`"${p.name}" is out of stock!`); return; }
  const ex=cart.find(c=>c.productId===p.id);
  if(ex){
    if(ex.qty>=p.stock){ alert(`Only ${p.stock} units in stock`); return; }
    ex.qty++;
  } else {
    cart.push({productId:p.id,sku:p.sku,name:p.name,price:p.price,qty:1,disc:0});
  }
  renderCart(); calcTotals();
}

function renderCart(){
  const body=document.getElementById('cart-body');
  const countEl=document.getElementById('cart-count');
  if(!body) return;
  if(cart.length===0){
    body.innerHTML=`<div class="cart-empty">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      <p style="font-size:13px">Cart is empty</p></div>`;
    if(countEl) countEl.textContent='0 items';
    return;
  }
  if(countEl) countEl.textContent=`${cart.reduce((s,c)=>s+c.qty,0)} items`;
  body.innerHTML=cart.map((item,i)=>`
  <div class="cart-item">
    <div class="cart-item-desc">
      <p>${escH(item.name)}</p>
      <span class="font-mono">${escH(item.sku)}</span>
    </div>
    <div class="qty-ctrl">
      <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
      <span class="qty-num">${item.qty}</span>
      <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
    </div>
    <div style="min-width:80px;text-align:right">
      <div style="font-weight:700">${fmt(item.price*item.qty)}</div>
      <div style="font-size:11px;color:var(--text3)">${fmt(item.price)} each</div>
    </div>
    <button onclick="removeFromCart(${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px" onmouseenter="this.style.color='var(--red)'" onmouseleave="this.style.color='var(--text3)'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>`).join('');
}

function changeQty(i,delta){
  const item=cart[i];
  const p=products.find(x=>x.id===item.productId);
  item.qty+=delta;
  if(item.qty<=0){ cart.splice(i,1); }
  else if(p && item.qty>p.stock){ item.qty=p.stock; alert(`Only ${p.stock} in stock`); }
  renderCart(); calcTotals();
}

function removeFromCart(i){ cart.splice(i,1); renderCart(); calcTotals(); }
function clearCart(){ if(cart.length&&!confirm('Clear cart?')) return; cart=[]; posCustomer=null; window._posLoyaltyDiscount=0; window._posStoreCreditUsed=0; renderCart(); calcTotals(); hideLoyaltyPanel(); }

function holdCart(){
  if(cart.length===0){ alert('Cart is empty — nothing to hold'); return; }
  const name=prompt('Give this held cart a name (e.g. customer name):')||('Hold '+new Date().toLocaleTimeString());
  heldCarts.push({ id:uid(), name, cart:[...cart], customer:posCustomer?{...posCustomer}:null, discount:document.getElementById('pos-disc')?.value||'0', timestamp:new Date().toISOString() });
  save('heldCarts',heldCarts);
  cart=[]; posCustomer=null; window._posLoyaltyDiscount=0; window._posStoreCreditUsed=0;
  renderCart(); calcTotals(); hideLoyaltyPanel();
  showAlert('global-alert',`Cart held as "${name}"`, 'green');
  addAudit('HOLD_CART',`Cart held: ${name}`);
}

function recallHeldCart(){
  if(heldCarts.length===0){ alert('No held carts'); return; }
  const html=`
    <div style="max-height:320px;overflow-y:auto">
      ${heldCarts.map((h,i)=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <p style="font-weight:600">${escH(h.name)}</p>
          <p style="font-size:12px;color:var(--text2)">${h.cart.length} items · ${new Date(h.timestamp).toLocaleTimeString()}</p>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="loadHeldCart(${i});closeModal()">Load</button>
          <button class="btn btn-danger btn-sm" onclick="deleteHeldCart(${i})">✕</button>
        </div>
      </div>`).join('')}
    </div>`;
  openModal('Held Carts', html, '<button class="btn btn-secondary" onclick="closeModal()">Close</button>');
}

function loadHeldCart(idx){
  const h=heldCarts[idx];
  if(!h) return;
  cart=[...h.cart]; posCustomer=h.customer||null;
  if(document.getElementById('pos-disc')) document.getElementById('pos-disc').value=h.discount||'0';
  heldCarts.splice(idx,1); save('heldCarts',heldCarts);
  renderCart(); calcTotals();
  if(posCustomer) showLoyaltyPanel(posCustomer);
  addAudit('RECALL_CART',`Cart recalled: ${h.name}`);
}

function deleteHeldCart(idx){
  heldCarts.splice(idx,1); save('heldCarts',heldCarts);
  recallHeldCart();
}

function calcTotals(){
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=(parseFloat(document.getElementById('pos-disc')?.value||0)||0)
    +(window._posLoyaltyDiscount||0)
    +(window._posStoreCreditUsed||0);
  const taxable=Math.max(0,sub-disc);
  const taxResult=calcCanadianTax(taxable, settings.province||'ON');
  const total=taxResult.total;

  if(document.getElementById('pos-sub')) document.getElementById('pos-sub').textContent=fmt(sub);

  const taxLinesEl=document.getElementById('pos-tax-lines');
  if(taxLinesEl){
    let html='';
    if(disc>0) html+=`<div class="total-row" style="color:var(--green)"><span>Discount / Redemption</span><span>−${fmt(disc)}</span></div>`;
    html+=taxResult.lines.map(l=>`<div class="total-row"><span>${l.label}</span><span>${fmt(l.amount)}</span></div>`).join('');
    taxLinesEl.innerHTML=html;
  }

  if(document.getElementById('pos-total')) document.getElementById('pos-total').textContent=fmt(total);
  window._posTaxResult=taxResult;
  window._posDisc=disc;
  window._posSub=sub;
  calcChange();
}

function calcChange(){
  const totalEl=document.getElementById('pos-total');
  if(!totalEl) return;
  const total=parseFloat(totalEl.textContent.replace(settings.currency,''))||0;
  const tendered=parseFloat(document.getElementById('pay-tendered')?.value||0)||0;
  const changeDiv=document.getElementById('change-display');
  const changeAmt=document.getElementById('change-amt');
  if(tendered>=total && total>0 && changeDiv){
    changeDiv.style.display='block';
    changeAmt.textContent=fmt(tendered-total);
  } else if(changeDiv) changeDiv.style.display='none';
}

function lookupCustomer(){
  const ph=(document.getElementById('cust-search')?.value||'').trim();
  const panel=document.getElementById('cust-result');
  if(!panel) return;

  // Guard: don't search on empty input
  if(!ph){
    panel.innerHTML=`<div class="alert alert-amber" style="margin:0;font-size:12px">Enter a phone number or customer name first, then click Find.</div>`;
    posCustomer=null;
    hideLoyaltyPanel();
    return;
  }

  // Need at least 2 chars to avoid accidental matches
  if(ph.length < 2){
    panel.innerHTML=`<div class="alert alert-amber" style="margin:0;font-size:12px">Type at least 2 characters to search.</div>`;
    posCustomer=null;
    hideLoyaltyPanel();
    return;
  }

  // Search by exact phone match first, then by name contains
  const found = customers.find(c =>
    c.phone === ph ||
    c.phone.replace(/\D/g,'') === ph.replace(/\D/g,'') ||
    c.name.toLowerCase().includes(ph.toLowerCase())
  );

  if(found){
    posCustomer=found;
    const creditBadge=(found.storeCredit||0)>0?`<span style="background:rgba(79,142,247,.15);color:var(--accent);border-radius:999px;padding:1px 8px;font-size:11px;font-weight:700">SC:${fmt(found.storeCredit||0)}</span>`:'';
    panel.innerHTML=`<div class="alert alert-green" style="margin:0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <strong>${escH(found.name)}</strong> ${creditBadge}<br>
          <span style="font-size:11px">${escH(found.phone)}</span>
          ${found.email?`<span style="font-size:11px"> · ${escH(found.email)}</span>`:''}
        </div>
        <button onclick="posCustomer=null;document.getElementById('cust-result').innerHTML='';document.getElementById('cust-search').value='';hideLoyaltyPanel()" style="background:none;border:none;color:var(--green);cursor:pointer;font-size:16px">✕</button>
      </div>
      <div style="margin-top:6px;font-size:11px;display:flex;gap:10px">
        <span>🏆 ${found.points} pts</span>
        <span>💰 ${fmt(found.spent)} spent</span>
        ${(found.storeCredit||0)>0?`<span>🏷️ ${fmt(found.storeCredit)} credit</span>`:''}
      </div>
    </div>`;
    // Show loyalty/credit panel
    showLoyaltyPanel(found);
  } else {
    posCustomer=null;
    panel.innerHTML=`<div class="alert alert-amber" style="margin:0">No customer found. Sale will be recorded as walk-in.</div>`;
    hideLoyaltyPanel();
  }
}

function showLoyaltyPanel(c){
  const p=document.getElementById('loyalty-panel');
  const info=document.getElementById('loyalty-info');
  if(!p||!info) return;
  p.style.display='block';
  info.innerHTML=`
    <div style="display:flex;gap:12px;font-size:12px">
      <span>🏆 <strong>${c.points}</strong> pts (≈${fmt(c.points/settings.pointsRedeemRate)} value)</span>
      <span>🏷️ <strong>${fmt(c.storeCredit||0)}</strong> credit</span>
    </div>`;
  // Update button states
  const ptsBtn=document.getElementById('redeem-pts-btn');
  const scBtn=document.getElementById('redeem-sc-btn');
  if(ptsBtn) ptsBtn.disabled=c.points<settings.pointsRedeemRate;
  if(scBtn) scBtn.disabled=!(c.storeCredit>0);
}

function hideLoyaltyPanel(){
  const p=document.getElementById('loyalty-panel');
  if(p) p.style.display='none';
  window._posLoyaltyDiscount=0;
  window._posStoreCreditUsed=0;
  calcTotals();
}

function redeemPointsAtPOS(){
  if(!posCustomer) return;
  const maxPoints=Math.floor(posCustomer.points/settings.pointsRedeemRate)*settings.pointsRedeemRate;
  const maxDollar=maxPoints/settings.pointsRedeemRate;
  const use=prompt(`You have ${posCustomer.points} points (≈${fmt(posCustomer.points/settings.pointsRedeemRate)}).
How many points to redeem? (min ${settings.pointsRedeemRate}, max ${maxPoints})`);
  if(!use) return;
  const pts=Math.floor(parseInt(use)/settings.pointsRedeemRate)*settings.pointsRedeemRate;
  if(pts<=0||pts>posCustomer.points){ alert('Invalid points amount'); return; }
  window._posLoyaltyDiscount=(window._posLoyaltyDiscount||0)+(pts/settings.pointsRedeemRate);
  document.getElementById('redemption-applied').innerHTML=
    `<span style="color:var(--green);font-size:11px">✓ ${pts} pts = ${fmt(pts/settings.pointsRedeemRate)} discount applied</span>`;
  calcTotals();
}

function redeemStoreCreditAtPOS(){
  if(!posCustomer||(posCustomer.storeCredit||0)<=0) return;
  const use=prompt(`Store credit available: ${fmt(posCustomer.storeCredit)}
How much to apply?`);
  if(!use) return;
  const amt=parseFloat(use);
  if(isNaN(amt)||amt<=0||amt>posCustomer.storeCredit){ alert('Invalid amount'); return; }
  window._posStoreCreditUsed=(window._posStoreCreditUsed||0)+amt;
  document.getElementById('redemption-applied').innerHTML=
    `<span style="color:var(--accent);font-size:11px">✓ ${fmt(amt)} store credit applied</span>`;
  calcTotals();
}

function completeSale(){
  if(cart.length===0){ alert('Cart is empty'); return; }

  // Use pre-computed tax result from calcTotals (or recompute if needed)
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=parseFloat(document.getElementById('pos-disc')?.value||0)||0;
  const taxable=Math.max(0,sub-disc);
  const taxResult=calcCanadianTax(taxable, settings.province||'ON');
  const total=taxResult.total;
  const tendered=parseFloat(document.getElementById('pay-tendered')?.value||0)||0;
  if(tendered>0 && tendered<total){ alert('Tendered amount is less than the total'); return; }

  const payment=document.getElementById('pay-method')?.value||'Cash';
  const invNumber = generateInvoiceNumber();

  // Deduct stock
  cart.forEach(item=>{
    const p=products.find(x=>x.id===item.productId);
    if(p){ p.stock=Math.max(0,p.stock-item.qty); }
  });
  save('products',products);

  // Handle store credit redemption
  if(posCustomer && (window._posStoreCreditUsed||0)>0){
    redeemStoreCredit(posCustomer.id, window._posStoreCreditUsed);
  }
  // Handle loyalty point redemption
  const loyaltyPtsUsed=Math.round((window._posLoyaltyDiscount||0)*settings.pointsRedeemRate);
  if(posCustomer && loyaltyPtsUsed>0){
    posCustomer.points=Math.max(0,posCustomer.points-loyaltyPtsUsed);
  }
  // Update customer — earn new points on final total
  if(posCustomer){
    const ptsEarned=Math.floor(total*settings.pointsPerDollar);
    posCustomer.points+=ptsEarned;
    posCustomer.spent+=total;
    posCustomer.lastVisit=today();
    save('customers',customers);
  }

  // Split payment
  const splitMethod=document.getElementById('split-method')?.value||'';
  const splitAmount=parseFloat(document.getElementById('split-amount')?.value||0)||0;
  const paymentSplit=splitMethod&&splitAmount>0?[
    {method:payment, amount:tendered-splitAmount},
    {method:splitMethod, amount:splitAmount}
  ]:null;

  const invoice={
    id:uid(), number:invNumber, date:today(),
    customerId:posCustomer?.id||null, customerName:posCustomer?.name||'Walk-in',
    customerPhone:posCustomer?.phone||'', customerEmail:posCustomer?.email||'',
    province: settings.province||'ON',
    lines:[...cart], subtotal:sub, discount:disc,
    taxLines:taxResult.lines,
    gst:taxResult.gst, pst:taxResult.pst, hst:taxResult.hst,
    totalTax:taxResult.totalTax,
    total, payment:paymentSplit?`${payment}+${splitMethod}`:payment,
    paymentSplit, tendered, change:Math.max(0,tendered-total),
    loyaltyPtsUsed, storeCreditUsed:window._posStoreCreditUsed||0,
    createdAt:new Date().toISOString()
  };
  invoices.push(invoice);
  save('invoices',invoices);
  addAudit('INVOICE_CREATE',`Invoice ${invNumber} — ${fmt(total)} — ${invoice.payment}`);

  // Keep a reference to the last completed invoice so the user can
  // manually reprint it if the browser blocked the automatic print dialog
  // (common in some embedded/in-app browsers and strict popup blockers).
  window._lastInvoice = invoice;

  // Print invoice
  printInvoice(invoice);

  // Post-sale: offer email receipt
  const custEmail=posCustomer?.email||'';
  if(custEmail){
    setTimeout(()=>{
      if(confirm(`Send email receipt to ${custEmail}?`)){
        sendEmailReceipt(invoice, custEmail);
      }
    },600);
  } else if(posCustomer) {
    setTimeout(()=>{
      const e=prompt('Enter email address to send receipt (or cancel to skip):');
      if(e&&e.includes('@')) sendEmailReceipt(invoice, e);
    },600);
  }

  cart=[]; posCustomer=null;
  window._posTaxResult=null; window._posLoyaltyDiscount=0; window._posStoreCreditUsed=0;
  renderPOS(document.getElementById('page-content'));
  showSaleCompleteBanner(invNumber, total);
}

/**
 * Shows a persistent success banner with a manual "Print Invoice" button.
 * This exists because window.print() can be silently blocked by some
 * embedded browsers, kiosk apps, or strict popup blockers — if that
 * happens the auto-print in printInvoice() does nothing visible, so this
 * gives the cashier an obvious manual way to trigger it themselves.
 */
function showSaleCompleteBanner(invNumber, total){
  let el=document.getElementById('sale-complete-banner');
  if(el) el.remove();
  el=document.createElement('div');
  el.id='sale-complete-banner';
  el.style.cssText='position:fixed;top:16px;right:16px;z-index:999;min-width:300px;background:var(--green-bg);border:1px solid rgba(62,207,110,.4);border-radius:10px;padding:14px 16px;box-shadow:0 8px 24px rgba(0,0,0,.2)';
  el.innerHTML=`
    <div style="color:var(--green);font-weight:700;font-size:13px;margin-bottom:8px">✅ Sale complete! Invoice ${escH(invNumber)} — ${fmt(total)}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="reprintLastInvoice()">🖨️ A4 Invoice</button>
      <button class="btn btn-secondary btn-sm" onclick="printThermalReceipt(window._lastInvoice)">🧾 Thermal Receipt</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('sale-complete-banner').remove()">Dismiss</button>
    </div>`;
  document.body.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },18000);
}

function reprintLastInvoice(){
  if(!window._lastInvoice){ alert('No recent invoice to print.'); return; }
  printInvoice(window._lastInvoice);
}

/**
 * Prints an 80mm thermal receipt — the narrow format used by POS receipt
 * printers. Much faster than the A4 invoice for quick in-store transactions.
 * Works by injecting a compact print-only stylesheet into a hidden div and
 * calling window.print(), same mechanism as the A4 invoice but different layout.
 */
function printThermalReceipt(inv){
  if(!inv){ alert('No invoice to print'); return; }
  const area=document.getElementById('print-area');
  const prov=CA_PROVINCES[inv.province||settings.province||'ON'];

  // Inject thermal stylesheet once
  if(!document.getElementById('thermal-print-style')){
    const s=document.createElement('style');
    s.id='thermal-print-style';
    s.textContent=`
    @media print {
      body > *:not(#print-area){ display:none !important }
    }

    window.print();
    setTimeout(cleanup, 5000);
  }));
}

function openProductPicker(){
  const html=`
  <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <input id="picker-search" placeholder="Search name, SKU, brand…" oninput="filterPicker()" style="flex:1;min-width:150px"/>
    <select id="picker-cat" onchange="filterPicker()" style="min-width:130px">
      <option value="">All categories</option>
      <option value="CASE">📱 Cases</option>
      <option value="CHARGER">🔌 Chargers</option>
      <option value="CABLE">🔗 Cables</option>
      <option value="SCREEN">🖥️ Screens</option>
      <option value="BATTERY">🔋 Batteries</option>
      <option value="ACCESSORY">🎧 Accessories</option>
    </select>
  </div>
  <div id="picker-list" style="max-height:380px;overflow-y:auto">
    ${renderPickerList(products)}
  </div>`;

}

function renderPickerList(prods){
  return `<table><thead><tr><th>SKU</th><th>Name</th><th>Brand</th><th>Price</th><th>Stock</th><th></th></tr></thead><tbody>
  ${prods.map(p=>`<tr>
    <td class="font-mono" style="font-size:11px">${escH(p.sku)}</td>
    <td>${escH(p.name)}</td>
    <td style="font-size:11px;color:var(--accent)">${escH(p.subcategory||'—')}</td>
    <td class="font-bold">${fmt(p.price)}</td>
    <td class="${p.stock<=p.threshold?'text-red':'text-green'}">${p.stock}</td>
    <td><button class="btn btn-primary btn-sm" onclick="addToCart(products.find(x=>x.id==='${p.id}'));closeModal()">Add</button></td>
  </tr>`).join('')}
  </tbody></table>`;
}

function filterPicker(){
  const q=(document.getElementById('picker-search')?.value||'').toLowerCase();
  const cat=document.getElementById('picker-cat')?.value||'';
  let filtered=products.filter(p=>
    !q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) || (p.subcategory||'').toLowerCase().includes(q)
  );
  if(cat) filtered=filtered.filter(p=>p.category===cat);
  document.getElementById('picker-list').innerHTML=renderPickerList(filtered);
}

      // (some older WebViews / embedded browsers don't support it).
      setTimeout(cleanupAfterPrint, 5000);
    });
  });
}

// Alias: renderRepairs now delegates to the full dual-mode
// kanban+table version. Both names work for backward compat.
function renderRepairs(c){ renderRepairsNew(c); }

// ── Kanban Board ──────────────────────────────────────────
// New dual-mode repairs page: table view + kanban board
function renderRepairsNew(c){
  const statusFilter=window._repairFilter||'';
  const search=(window._repairSearch||'').toLowerCase();
  const view=window._repairView||'table';
  let list=repairs.slice().reverse();
  if(statusFilter) list=list.filter(r=>r.status===statusFilter);
  if(search) list=list.filter(r=>
    r.customerName?.toLowerCase().includes(search)||
    r.phone?.includes(search)||
    r.device?.toLowerCase().includes(search)||
    String(r.ticketNo).includes(search)
  );

  c.innerHTML=`
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <input placeholder="Search customer, device, ticket #…" value="${escH(window._repairSearch||'')}"
      style="flex:1;min-width:180px" oninput="window._repairSearch=this.value;debounce('srep',()=>renderRepairsNew(document.getElementById('page-content')),250)"/>
    <select onchange="window._repairFilter=this.value;debounce('rflt',()=>renderRepairsNew(document.getElementById('page-content')),120)">
      <option value="">All statuses</option>
      ${Object.entries(STATUS_LABELS).map(([k,v])=>`<option value="${k}" ${statusFilter===k?'selected':''}>${v}</option>`).join('')}
    </select>
    <div style="display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:3px">
      <button onclick="window._repairView='table';renderRepairsNew(document.getElementById('page-content'))"
        style="padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;background:${view==='table'?'var(--surface)':'transparent'};color:${view==='table'?'var(--text)':'var(--text2)'}">
        ☰ Table
      </button>
      <button onclick="window._repairView='kanban';renderRepairsNew(document.getElementById('page-content'))"
        style="padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;background:${view==='kanban'?'var(--surface)':'transparent'};color:${view==='kanban'?'var(--text)':'var(--text2)'}">
        ⬛ Board
      </button>

  </div>
  ${view==='kanban' ? renderKanban(search) : renderRepairsTable(list)}`;

function renderKanban(search){
  const kanbanCols=['RECEIVED','DIAGNOSED','WAITING','IN_PROGRESS','READY','COMPLETED'];
  const colColors={RECEIVED:'#6b5b95',DIAGNOSED:'#2980b9',WAITING:'var(--amber)',IN_PROGRESS:'var(--accent)',READY:'var(--green)',COMPLETED:'var(--text3)'};
  const colBg={RECEIVED:'rgba(107,91,149,.08)',DIAGNOSED:'rgba(41,128,185,.08)',WAITING:'rgba(184,134,11,.08)',IN_PROGRESS:'rgba(15,139,95,.08)',READY:'rgba(15,139,95,.14)',COMPLETED:'rgba(100,100,100,.06)'};

  let boardRepairs=repairs.filter(r=>r.status!=='COLLECTED');
  if(search) boardRepairs=boardRepairs.filter(r=>
    r.customerName?.toLowerCase().includes(search)||
    r.device?.toLowerCase().includes(search)||
    String(r.ticketNo).includes(search)
  );

  const todayStr=today();

  return `
  <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;min-height:500px;-webkit-overflow-scrolling:touch">
    ${kanbanCols.map(status=>{
      const colTickets=boardRepairs.filter(r=>r.status===status);

let _dragId=null;

function initKanbanDrag(){
  document.querySelectorAll('.kanban-card').forEach(card=>{
    let startX,startY,clone,origCol;
    card.addEventListener('touchstart',e=>{
      const t=e.touches[0]; startX=t.clientX; startY=t.clientY;
      _dragId=card.dataset.id; origCol=card.closest('.kanban-col');
    },{passive:true});
    card.addEventListener('touchmove',e=>{
      e.preventDefault();
      const t=e.touches[0];
      if(!clone){
        clone=card.cloneNode(true);
        clone.style.cssText+=';position:fixed;z-index:9999;opacity:.85;pointer-events:none;width:200px;box-shadow:0 8px 24px rgba(0,0,0,.3);transform:rotate(2deg)';
        document.body.appendChild(clone);
        card.style.opacity='.3';
      }
      clone.style.left=(t.clientX-100)+'px';
      clone.style.top=(t.clientY-60)+'px';
    },{passive:false});
    card.addEventListener('touchend',e=>{
      if(clone){
        const t=e.changedTouches[0];
        const underEl=document.elementFromPoint(t.clientX,t.clientY);
        const col=underEl?.closest?.('.kanban-col');
        if(col&&_dragId) kanbanUpdateStatus(_dragId,col.dataset.status);
        clone.remove(); clone=null;
        card.style.opacity='1';
      }
      _dragId=null;
    });
  });
}

function onKanbanDragStart(e,id){
  _dragId=id;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{ if(e.target) e.target.style.opacity='.3'; },0);
}
function onKanbanDragEnd(e){ if(e.target) e.target.style.opacity='1'; document.querySelectorAll('.kanban-col').forEach(c=>{ c.style.boxShadow='none'; }); }
function onKanbanDrop(e,newStatus){
  e.preventDefault(); e.currentTarget.style.boxShadow='none';
  if(_dragId) kanbanUpdateStatus(_dragId,newStatus);
  _dragId=null;
}

function kanbanUpdateStatus(repairId,newStatus){
  const r=repairs.find(x=>x.id===repairId);
  if(!r||r.status===newStatus) return;
  const old=r.status;
  r.status=newStatus; r.updatedAt=today();
  (r.statusHistory=r.statusHistory||[]).push({status:newStatus,note:`Moved from ${STATUS_LABELS[old]}`,date:new Date().toISOString()});
  save('repairs',repairs);
  if(typeof addAudit==='function') addAudit('REPAIR_STATUS',`#${r.ticketNo} → ${STATUS_LABELS[newStatus]}`);
  if(newStatus==='READY'&&(r.phone||r.customerPhone)) sendReadySMS(r);
  renderRepairsNew(document.getElementById('page-content'));
  showAlert('global-alert',`✅ #${r.ticketNo} moved to ${STATUS_LABELS[newStatus]}`,'green');
}
