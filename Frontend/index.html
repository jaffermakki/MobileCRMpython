// Logo upload — converts to base64 and stores in settings
function uploadLogo(e){
  const file=e.target.files[0]; if(!file) return;
  if(file.size>500000){ alert('Logo file must be under 500KB. Please resize your image first.'); return; }
  const reader=new FileReader();
  reader.onload=function(ev){
    settings.logoDataUrl=ev.target.result;
    save('settings',settings);
    // Only update logo display elements — no full page re-render needed
    const preview=document.getElementById('logo-preview');
    if(preview){ preview.src=ev.target.result; preview.style.display='block'; }
    const sli=document.getElementById('sidebar-logo-img');
    if(sli) sli.src=ev.target.result;
    showAlert('global-alert','✓ Logo uploaded successfully','green');
  };
  reader.readAsDataURL(file);
}

function removeLogo(){
  if(!confirm('Remove the shop logo?')) return;
  settings.logoDataUrl='';
  save('settings',settings);
  renderSettings(document.getElementById('page-content'));
}

// Push all local data up to cloud — see full implementation below

function clearAllData(){
  if(!confirm('This will DELETE all products, customers, repairs, and invoices. This cannot be undone.\n\nType "yes" to confirm.')) return;
  const answer=prompt('Type "yes" to confirm complete data reset:');
  if(answer!=='yes') return;
  ['settings','products','customers','repairs','invoices'].forEach(k=>localStorage.removeItem('mshop_'+k));
  location.reload();
}

function openModal(title,html,footer,wide=false){
  let el=document.getElementById('modal-overlay');
  if(el) el.remove();
  el=document.createElement('div');
  el.id='modal-overlay';
  el.className='modal-overlay';
  el.onclick=function(e){ if(e.target===el) closeModal(); };
  el.innerHTML=`
  <div class="modal" style="${wide?'max-width:680px':''}">
    <div class="modal-header">
      <h3>${escH(title)}</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">${html}</div>
    ${footer?`<div class="modal-footer">${footer}</div>`:''}
  </div>`;
  document.body.appendChild(el);
  setTimeout(()=>{ const first=el.querySelector('input:not([disabled]),select,textarea'); if(first) first.focus(); },50);
}

function closeModal(){
  const el=document.getElementById('modal-overlay');
  if(el) el.remove();
}

// ══════════════════════════════════════════════════════════
// GLOBAL ALERT
// ══════════════════════════════════════════════════════════
function showAlert(id,msg,type='green'){
  let el=document.getElementById(id);
  if(!el){
    el=document.createElement('div');
    el.id=id;
    el.style.cssText='position:fixed;top:16px;right:16px;z-index:999;min-width:280px;max-width:420px;animation:slideIn .2s ease';
    document.body.appendChild(el);
  }
  el.className=`alert alert-${type}`;
  el.textContent=msg;
  clearTimeout(el._timer);
  el._timer=setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },4000);
}

// ══════════════════════════════════════════════════════════
// GLOBAL CUSTOMER QUICK-SEARCH
// Works from any page — shows customer profile + recent repairs/invoices
// ══════════════════════════════════════════════════════════
function globalUnifiedSearch(q){
  const results=document.getElementById('global-search-results');
  if(!results) return;
  q=(q||'').trim().toLowerCase();
  if(q.length<2){ results.innerHTML=''; return; }

  const clearSearch=()=>{
    document.getElementById('global-cust-search').value='';
    results.innerHTML='';
  };

  // ── Customers ────────────────────────────────────────────
  const custMatches=customers.filter(c=>
    c.name.toLowerCase().includes(q)||c.phone.includes(q)||(c.email||'').toLowerCase().includes(q)
  ).slice(0,4);

  // ── Repairs ─────────────────────────────────────────────
  const repairMatches=repairs.filter(r=>
    String(r.ticketNo).includes(q)||
    r.customerName.toLowerCase().includes(q)||
    r.device.toLowerCase().includes(q)||
    (r.issue||'').toLowerCase().includes(q)
  ).slice(0,3);

  // ── Invoices ─────────────────────────────────────────────
  const invMatches=invoices.filter(i=>
    i.number.toLowerCase().includes(q)||
    (i.customerName||'').toLowerCase().includes(q)||
    (i.customerPhone||'').includes(q)
  ).slice(0,3);

  // ── Products ─────────────────────────────────────────────
  const prodMatches=products.filter(p=>
    p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)||
    (p.subcategory||'').toLowerCase().includes(q)
  ).slice(0,3);

  if(!custMatches.length&&!repairMatches.length&&!invMatches.length&&!prodMatches.length){
    results.innerHTML=`<div style="padding:16px;font-size:13px;color:var(--text3);text-align:center">No results for "<strong>${escH(q)}</strong>"</div>`;
    return;
  }

  const section=(title,icon,html)=>html?`
    <div style="padding:8px 14px 4px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)">${icon} ${title}</div>
    ${html}`:'';

  const row=(content,onClick)=>`
    <div onclick="${onClick};(${clearSearch})()" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background='transparent'">
      ${content}
    </div>`;

  results.innerHTML=`
  ${section('Customers','👤', custMatches.map(c=>{
    const openR=repairs.find(r=>r.customerId===c.id&&!['COMPLETED','COLLECTED'].includes(r.status));
    return row(`
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0">${c.name.charAt(0).toUpperCase()}</div>
        <div style="flex:1"><p style="font-weight:700;font-size:13px">${escH(c.name)}</p><p style="font-size:11px;color:var(--text3)">${escH(c.phone)}${c.email?` · ${escH(c.email)}`:''}</p></div>
        <div style="text-align:right"><p style="font-size:12px;font-weight:700;color:var(--green)">${fmt(c.spent)}</p><p style="font-size:10px;color:var(--text3)">${c.points} pts</p></div>
      </div>
      ${openR?`<div style="margin-top:5px;padding:4px 8px;background:var(--amber-bg);border-radius:5px;font-size:11px;color:var(--amber)">🔧 Open: ${escH(openR.device)} — ${STATUS_LABELS[openR.status]}</div>`:''}`,
      `showPage('customers');openCustomerDetail('${c.id}')`);
  }).join(''))}

  ${section('Repair Tickets','🔧', repairMatches.map(r=>row(`
    <div style="display:flex;align-items:center;gap:10px">
      <span class="badge ${STATUS_BADGE[r.status]}" style="flex-shrink:0">${STATUS_LABELS[r.status]}</span>
      <div style="flex:1"><p style="font-weight:700;font-size:13px">#${r.ticketNo} — ${escH(r.device)}</p><p style="font-size:11px;color:var(--text3)">${escH(r.customerName)} · ${escH(r.issue||'')}</p></div>
      ${r.promisedBy?`<span style="font-size:10px;color:${r.promisedBy<today()?'var(--red)':'var(--text3)'}">${fmtDate(r.promisedBy)}</span>`:''}
    </div>`,
    `showPage('repairs');openRepairDetail('${r.id}')`)).join(''))}

  ${section('Invoices','🧾', invMatches.map(i=>row(`
    <div style="display:flex;align-items:center;gap:10px">
      <span class="font-mono text-accent" style="font-size:12px;flex-shrink:0">${escH(i.number)}</span>
      <div style="flex:1"><p style="font-weight:700;font-size:13px">${escH(i.customerName||'Walk-in')}</p><p style="font-size:11px;color:var(--text3)">${fmtDate(i.date)} · ${escH(i.payment)}</p></div>
      <span style="font-weight:700;font-size:13px;color:var(--green)">${fmt(i.total)}</span>
    </div>`,
    `showPage('refunds')`)).join(''))}

  ${section('Products','📦', prodMatches.map(p=>row(`
    <div style="display:flex;align-items:center;gap:10px">
      <span class="badge badge-blue" style="flex-shrink:0">${p.category}</span>
      <div style="flex:1"><p style="font-weight:700;font-size:13px">${escH(p.name)}</p><p style="font-size:11px;color:var(--text3);font-family:var(--mono)">${escH(p.sku)}</p></div>
      <div style="text-align:right"><p style="font-size:13px;font-weight:700">${fmt(p.price)}</p><p style="font-size:10px;color:${p.stock<=p.threshold?'var(--red)':'var(--text3)'}">${p.stock} in stock</p></div>
    </div>`,
    `showPage('inventory')`)).join(''))}
  `;
}
